// Voice recording from dialog
const addVoiceBtn = document.getElementById('add-voice-btn');
addVoiceBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    addVoiceBtn.textContent = 'Recording… click to stop';
    addVoiceBtn.style.borderColor = '#ef4444';
    addVoiceBtn.style.color = '#ef4444';

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      addVoiceBtn.textContent = 'Record audio';
      addVoiceBtn.style.borderColor = '';
      addVoiceBtn.style.color = '';
      stream.getTracks().forEach(t => t.stop());
      closeAddDialog();

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const formData = new FormData();
      formData.append('file', blob, 'voice.webm');

      const pt = processingToast('Transcribing audio…');
      try {
        const data = await api('/api/transcribe', { method: 'POST', body: formData });
        if (!data) { pt.done('Transcription failed', 'error'); return; }
        if (data.transcription) pt.update(`Heard: "${data.transcription}"`);
        if (data.action === 'search') {
          pt.done('Search results');
          showSearchResults(data.results, data.response);
        } else if (data.action === 'add') {
          pt.done(data.response || `Added: ${data.node?.label}`);
          await loadGraph();
          if (data.node?.id && nodeMap[data.node.id]) {
            targetCam.x = nodeMap[data.node.id].x;
            targetCam.y = nodeMap[data.node.id].y;
            simAlpha = 1.0;
          }
        } else {
          pt.done(data.response || 'Done');
        }
      } catch (e) {
        pt.done('Voice transcription failed', 'error');
      }
    };
    mediaRecorder.start();
  } catch (e) {
    toast('Microphone access denied', 'error');
  }
});

function uploadFile(file) {

  return uploadImage(file);

async function uploadImage(file) {

let positionSaveTimeout = null;
let _positionsDirty = false;

function _getPositionData() {
  return nodes.filter(n => n._pinned).map(n => ({
    id: n.id, x: Math.round(n.x * 100) / 100, y: Math.round(n.y * 100) / 100
  }));
}

function saveNodePosition() {
  _positionsDirty = true;
  clearTimeout(positionSaveTimeout);
  positionSaveTimeout = setTimeout(async () => {
    const positions = _getPositionData();
    if (positions.length) {
      await api('/api/positions', {
        method: 'POST',
        body: JSON.stringify(positions)
      });
    }
    _positionsDirty = false;
    positionSaveTimeout = null;
  }, 300);
}

// Flush pending saves on page unload via sendBeacon (only fallback)
window.addEventListener('beforeunload', () => {
  if (_positionsDirty) {
    clearTimeout(positionSaveTimeout);
    const positions = _getPositionData();
    if (positions.length) {
      navigator.sendBeacon(`${API}/api/positions`, new Blob([JSON.stringify(positions)], { type: 'application/json' }));
    }
  }
});

// ─── Stream View ──────────────────────────
function renderStream() {
  const container = document.getElementById('view-stream');
  if (!container) return;
  streamPage = 0;

  // Build filter bar
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'inbox', label: 'Inbox' },
    { key: 'idea', label: 'Ideas' },
    { key: 'url', label: 'URLs' },
    { key: 'image', label: 'Images' },
    { key: 'paper', label: 'Papers' },
    { key: 'task', label: 'Tasks' },
    { key: 'today', label: 'Today' },
    { key: 'week', label: 'This Week' },
  ];

  container.innerHTML = `
    <div class="stream-filters" id="stream-filters">
      ${filters.map(f => `<button class="stream-chip${streamFilter === f.key ? ' active' : ''}" data-filter="${f.key}">${f.label}</button>`).join('')}
    </div>
    <div id="stream-list"></div>
  `;

  // Filter chip click handlers
  container.querySelectorAll('.stream-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      streamFilter = chip.dataset.filter;
      container.querySelectorAll('.stream-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === streamFilter));
      streamPage = 0;
      renderStreamCards();
    });
  });

  renderStreamCards();
}

function filterStreamNodes() {
  const now = Date.now();
  const dayMs = 86400000;
  let filtered = nodes.filter(n => n.type !== 'daily');

  if (streamFilter === 'inbox') {
    filtered = filtered.filter(n => n.status === 'inbox');
  } else if (streamFilter === 'today') {
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    filtered = filtered.filter(n => new Date(n.created) >= todayStart);
  } else if (streamFilter === 'week') {
    filtered = filtered.filter(n => (now - new Date(n.created).getTime()) < 7 * dayMs);
  } else if (['idea','url','image','paper','task'].includes(streamFilter)) {
    filtered = filtered.filter(n => n.type === streamFilter);
  }
  // Sort by created DESC
  filtered.sort((a, b) => new Date(b.created) - new Date(a.created));
  return filtered;
}

function buildStreamCard(node) {
  const card = document.createElement('div');
  card.className = 'stream-card' + (node.status === 'inbox' ? ' inbox' : '');
  card.dataset.id = node.id;

  const color = TYPE_COLORS[node.type] || TYPE_COLORS.note;
  const thumbUrl = getThumbUrl(node);
  const edgeCount = getEdgeCount(node.id);
  const preview = (node.content || '').replace(/\n/g, ' ').slice(0, 150);
  // Temperature-based opacity: cold nodes fade
  const temp = node.temperature || 1;
  const opacity = Math.max(0.5, Math.min(1, 0.4 + temp * 0.4));

  card.style.opacity = opacity;
  card.innerHTML = `
    ${thumbUrl ? `<img class="stream-card-thumb" src="${escapeHtml(thumbUrl)}" alt="" loading="lazy" />` : ''}
    <div class="stream-card-body">
      <div class="stream-card-header">
        <div class="stream-type-dot" style="background:${color}"></div>
        <span class="stream-type-label">${escapeHtml(node.type)}</span>
        ${node.starred ? '<span style="color:var(--warm)">&#9733;</span>' : ''}
      </div>
      <div class="stream-card-label">${escapeHtml(node.label || '(untitled)')}</div>
      ${preview ? `<div class="stream-card-preview">${escapeHtml(preview)}</div>` : ''}
      <div class="stream-card-footer">
        ${edgeCount ? `<span>${edgeCount} link${edgeCount !== 1 ? 's' : ''}</span>` : ''}
        ${node.url ? '<span style="color:var(--url)">&#128279;</span>' : ''}
        <span class="stream-card-time">${relativeTime(node.created)}</span>
      </div>
    </div>
  `;

  card.addEventListener('click', () => enterFocusView(node.id));
  return card;
}

function renderStreamCards() {
  const list = document.getElementById('stream-list');
  if (!list) return;
  list.innerHTML = '';

  const filtered = filterStreamNodes();
  const end = (streamPage + 1) * STREAM_PAGE_SIZE;
  const pageItems = filtered.slice(0, end);

  if (pageItems.length === 0) {
    list.innerHTML = `<div class="stream-empty">${streamFilter === 'all' ? 'No nodes yet. Type something below to add your first thought.' : 'No ' + streamFilter + ' nodes found.'}</div>`;
    return;
  }

  for (const node of pageItems) {
    list.appendChild(buildStreamCard(node));
  }

  // "Load more" button
  if (end < filtered.length) {
    const btn = document.createElement('button');
    btn.className = 'stream-load-more';
    btn.textContent = `Load more (${filtered.length - end} remaining)`;
    btn.addEventListener('click', () => {
      streamPage++;
      renderStreamCards();
    });
    list.appendChild(btn);
  }
}

async function enterFocusView(nodeId) {
  setLoading(true);
  const data = await api(`/api/node/${nodeId}`);
  setLoading(false);
  if (!data) return;

  focusState.active = true;
  focusState.centerId = nodeId;
  focusState.centerData = data;
  focusState.isEditing = false;

  // Enable focus tab
  const focusTab = document.getElementById('tab-focus');
  if (focusTab) focusTab.disabled = false;

  switchView('focus');
}

function renderFocusView() {
  const container = document.getElementById('view-focus');
  if (!container || !focusState.centerData) return;
  const data = focusState.centerData;
  const color = TYPE_COLORS[data.type] || TYPE_COLORS.note;

  // Build nav bar
  const historyLabels = focusState.history.map((h, i) =>
    `<span class="focus-breadcrumb-item" data-idx="${i}" style="cursor:pointer;color:var(--accent)">${escapeHtml((h.label || '').slice(0, 20))}</span>`
  ).join(' › ');

    <div class="focus-nav">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <div class="focus-breadcrumb">${historyLabels}${historyLabels ? ' › ' : ''}<strong>${escapeHtml((data.label || '').slice(0, 30))}</strong></div>
      <label class="focus-2hop-toggle">
        <input type="checkbox" id="focus-2hop" ${focusState.show2Hop ? 'checked' : ''} />
        2-hop
      </label>
    </div>
    <div class="focus-layout" id="focus-layout">
      <svg id="focus-lines" width="100%" height="100%"></svg>
      <div id="focus-center"></div>
    </div>
  `;

  // Wire nav
  const backBtn = document.getElementById('focus-back');
  if (backBtn) backBtn.addEventListener('click', focusGoBack);

  container.querySelectorAll('.focus-breadcrumb-item').forEach(el => {
    el.addEventListener('click', () => {

function renderFocusCenter(data) {

    ${data.meta?.pdf_file ? `<a href="/uploads/${escapeHtml(data.meta.pdf_file)}" target="_blank" rel="noopener" download style="font-family:var(--mono);font-size:11px;color:var(--paper);display:block;margin-bottom:6px">Download PDF</a>` : ''}

      <button class="focus-nav-btn" data-action="star">${data.starred ? 'Unstar' : 'Star'}</button>

  // Wire action buttons
  center.querySelectorAll('[data-action]').forEach(btn => {

  });

function renderFocusNeighbors(connected) {
  const layout = document.getElementById('focus-layout');
  const svgEl = document.getElementById('focus-lines');
  if (!layout || !svgEl) return;

  // Remove old neighbors
  layout.querySelectorAll('.focus-neighbor').forEach(el => el.remove());
  svgEl.innerHTML = '';

  if (!connected || connected.length === 0) return;

  const centerEl = document.getElementById('focus-center');
  const layoutRect = layout.getBoundingClientRect();
  const centerRect = centerEl.getBoundingClientRect();
  const cx = centerRect.left - layoutRect.left + centerRect.width / 2;
  const cy = centerRect.top - layoutRect.top + centerRect.height / 2;

  // Radius for neighbor circle — clamp to viewport
  const radius = Math.min(layoutRect.width * 0.35, layoutRect.height * 0.35, 250);

  connected.forEach((conn, i) => {
    const angle = (2 * Math.PI * i / connected.length) - Math.PI / 2;
    const nx = cx + Math.cos(angle) * radius;
    const ny = cy + Math.sin(angle) * radius;

    // Create neighbor element
    const el = createNeighborElement(conn, false);
    el.style.left = `${nx - 45}px`;
    el.style.top = `${ny - 35}px`;
    layout.appendChild(el);

    // SVG line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cx);
    line.setAttribute('y1', cy);
    line.setAttribute('x2', nx);
    line.setAttribute('y2', ny);
    line.setAttribute('class', 'focus-edge-1hop');
    const weight = conn.edge_weight || 0.5;
    line.setAttribute('stroke-width', 1 + weight * 2);
    svgEl.appendChild(line);
  });

  // 2-hop neighbors
  if (focusState.show2Hop) {
    render2HopNeighbors(connected, cx, cy, radius, layout, svgEl);
  }
}

async function render2HopNeighbors(connected, cx, cy, radius1, layout, svgEl) {
  const hop1Ids = new Set([focusState.centerId, ...connected.map(c => c.id)]);
  const outerRadius = radius1 * 1.7;

  for (const conn of connected) {
    const hop2Data = await api(`/api/node/${conn.id}`);
    if (!hop2Data?.connected) continue;
    const hop2 = hop2Data.connected.filter(c => !hop1Ids.has(c.id)).slice(0, 3);
    if (hop2.length === 0) continue;

    // Position hop-2 nodes in a small arc beyond the hop-1 node
    const connAngle = Math.atan2(
      (parseFloat(layout.querySelector(`[data-id="${conn.id}"]`)?.style.top) || cy) + 35 - cy,
      (parseFloat(layout.querySelector(`[data-id="${conn.id}"]`)?.style.left) || cx) + 45 - cx
    );

    hop2.forEach((h2, j) => {
      const spread = 0.4;
      const angle = connAngle + (j - (hop2.length - 1) / 2) * spread;
      const nx = cx + Math.cos(angle) * outerRadius;
      const ny = cy + Math.sin(angle) * outerRadius;

      const el = createNeighborElement(h2, true);
      el.style.left = `${nx - 35}px`;
      el.style.top = `${ny - 25}px`;
      layout.appendChild(el);

      // Dashed line from hop-1 to hop-2
      const h1El = layout.querySelector(`[data-id="${conn.id}"]`);
      if (h1El) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', parseFloat(h1El.style.left) + 45);
        line.setAttribute('y1', parseFloat(h1El.style.top) + 35);
        line.setAttribute('x2', nx);
        line.setAttribute('y2', ny);
        line.setAttribute('class', 'focus-edge-2hop');
        svgEl.appendChild(line);
      }
    });
  }
}

function createNeighborElement(conn, isHop2) {
  const el = document.createElement('div');
  el.className = 'focus-neighbor' + (isHop2 ? ' hop2' : '');
  el.dataset.id = conn.id;
  const color = TYPE_COLORS[conn.type] || TYPE_COLORS.note;

  // Check for thumbnail
  const thumbUrl = conn.image ? `/uploads/${conn.image}` : null;

  el.innerHTML = `
    <div class="focus-neighbor-ring" style="border-color:${color}">
      ${thumbUrl ? `<img src="${escapeHtml(thumbUrl)}" alt="" />` : `<div class="focus-neighbor-icon" style="background:${color}"></div>`}
    </div>
    <div class="focus-neighbor-label">${escapeHtml((conn.label || '').slice(0, 25))}</div>
    <div class="focus-neighbor-edge">${escapeHtml((conn.edge_label || 'related').replace(/_/g, ' '))}</div>
  `;

  el.addEventListener('click', () => focusNavigate(conn.id));
  return el;
}

function focusNavigate(nodeId) {
  // Push current to history
  if (focusState.centerData) {
    focusState.history.push({
      id: focusState.centerId,
      label: focusState.centerData.label
    });
  }
  enterFocusView(nodeId);
}

function focusGoBack() {
  if (focusState.history.length === 0) return;
  const prev = focusState.history.pop();
  enterFocusView(prev.id);
}

async function handleFocusAction(action) {
  const data = focusState.centerData;
  if (!data) return;

  if (action === 'edit') {
    const labelEl = document.getElementById('focus-label');
    const contentEl = document.getElementById('focus-content');
    if (!labelEl || !contentEl) return;

    if (!focusState.isEditing) {
      focusState.isEditing = true;
      labelEl.contentEditable = 'true';
      labelEl.focus();
      contentEl.contentEditable = 'true';
      // Change button text
      const btn = document.querySelector('[data-action="edit"]');
      if (btn) btn.textContent = 'Save';
    } else {
      // Save
      focusState.isEditing = false;
      const newLabel = document.getElementById('focus-label').textContent.trim();
      const newContent = document.getElementById('focus-content').textContent.trim();
      await api(`/api/node/${data.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ label: newLabel, content: newContent })
      });
      labelEl.contentEditable = 'false';
      contentEl.contentEditable = 'false';
      // Refresh
      await loadGraph();
      enterFocusView(data.id);
    }
  } else if (action === 'promote') {
    await api(`/api/node/${data.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'permanent' })
    });
    await loadGraph();
    enterFocusView(data.id);
  } else if (action === 'star') {
    await api(`/api/node/${data.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ starred: !data.starred })
    });
    await loadGraph();
    enterFocusView(data.id);
  } else if (action === 'link') {
    // Open command palette in link mode
    const overlay = document.getElementById('cmd-overlay');
    overlay.classList.add('open');
    const input = document.getElementById('cmd-input');
    input.value = '>';
    input.focus();
    // Override click to create link
    const origHandler = input._focusLinkHandler;
    if (origHandler) input.removeEventListener('input', origHandler);
    const linkHandler = async () => {
      const query = input.value.replace(/^>/, '').trim();
      if (!query) return;
      const searchData = await api(`/api/search?q=${encodeURIComponent(query)}&limit=8`);
      const cmdResults = document.getElementById('cmd-results');
      if (!searchData?.results?.length) {
        cmdResults.innerHTML = '<div class="cmd-item" style="color:var(--text-muted)">No results</div>';
        return;
      }
      cmdResults.innerHTML = searchData.results.map((r, i) => {
        const c = TYPE_COLORS[r.node_type] || TYPE_COLORS.note;
        return `<div class="cmd-item ${i === 0 ? 'active' : ''}" data-id="${r.id}">
          <div class="conn-dot" style="background:${c}"></div>
          <span>${r.label || r.content?.slice(0, 50)}</span>
          <span class="cmd-item-type">link</span>
        </div>`;
      }).join('');
      cmdResults.querySelectorAll('.cmd-item').forEach(el => {
        el.addEventListener('click', async () => {
          const targetId = el.dataset.id;
          await api('/api/link', {
            method: 'POST',
            body: JSON.stringify({ source: data.id, target: targetId, label: 'related' })
          });
          document.getElementById('cmd-overlay').classList.remove('open');
          input.removeEventListener('input', linkHandler);
          await loadGraph();
          enterFocusView(data.id);
        });
      });
    };
    input._focusLinkHandler = linkHandler;
    input.addEventListener('input', linkHandler);
  } else if (action === 'show-in-map') {
    if (nodeMap[data.id]) {
      targetCam.x = nodeMap[data.id].x;
      targetCam.y = nodeMap[data.id].y;
      targetCam.zoom = 1.5;
      selectedNode = nodeMap[data.id];
    }
    switchView('map');
  } else if (action === 'delete') {
    if (confirm(`Delete "${(data.label || '').slice(0, 40)}"?`)) {
      await api(`/api/node/${data.id}`, { method: 'DELETE' });
      await loadGraph();
      exitFocusView();
    }
  }
}

function exitFocusView() {
  focusState.active = false;
  focusState.centerId = null;
  focusState.centerData = null;
  focusState.history = [];
  focusState.isEditing = false;
  const focusTab = document.getElementById('tab-focus');
  if (focusTab) focusTab.disabled = true;
  switchView(previousView === 'focus' ? 'stream' : previousView);
}

// ─── Triage View ──────────────────────────
const triageState = { active: false, items: [], index: 0, undoStack: [], isEditing: false };

async function startTriage() {
  setLoading(true);
  const data = await api('/api/inbox');
  setLoading(false);
  if (!data || !data.items || data.items.length === 0) {
    showTriageZero();
    triageState.active = true;
    triageState.items = [];
    triageState.index = 0;
    return;
  }
  triageState.active = true;
  triageState.items = data.items;
  triageState.index = 0;
  triageState.undoStack = [];
  triageState.isEditing = false;
  showTriageItem();
}

function showTriageZero() {
  const container = document.getElementById('view-triage');

  const connectedNodes = edges
    .filter(e => e.source === item.id || e.target === item.id)
    .map(e => {
      const otherId = e.source === item.id ? e.target : e.source;
      const other = nodeMap[otherId];
      return other ? { label: other.label, type: other.type, weight: e.weight } : null;
    })

    .sort((a, b) => (b.weight || 0) - (a.weight || 0))
    .slice(0, 5);

  container.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:20px;padding:60px 16px 120px">
      <div style="width:min(500px,100%);display:flex;align-items:center;gap:12px">
        <span id="process-progress" style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">${index + 1} of ${items.length}</span>
        <div style="flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden">

        </div>
      </div>
      <div id="triage-card-wrapper">
        <div id="process-card" class="card-enter" style="width:min(500px,calc(100% - 40px));background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow)">
          <div id="process-type-badge" style="font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:12px;background:${typeColor}20;color:${typeColor}">${escapeHtml(item.type)}</div>
          <div id="process-label" style="font-size:18px;font-weight:600;margin-bottom:8px;line-height:1.3;color:var(--text)">${escapeHtml(item.label || '(no label)')}</div>
          ${item.image ? `<img class="triage-image-preview" src="/uploads/${escapeHtml(item.image)}" alt="" />` : ''}
          ${item.url ? `<div class="triage-url-preview"><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" style="color:var(--url)">${escapeHtml(item.url)}</a></div>` : ''}
          <div id="process-content" style="font-size:13.5px;line-height:1.7;color:var(--text-dim);margin-bottom:12px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto">${escapeHtml(item.content || '')}</div>
          ${connectedNodes.length ? `
            <div class="triage-connections">
              ${connectedNodes.map(c => {
                const cc = TYPE_COLORS[c.type] || TYPE_COLORS.note;
                return `<span class="triage-conn-chip"><span class="triage-conn-dot" style="background:${cc}"></span>${escapeHtml((c.label || '').slice(0, 20))}<span class="triage-conn-weight">${c.weight ? (c.weight * 100).toFixed(0) + '%' : ''}</span></span>`;
              }).join('')}

          <div id="process-meta" style="font-family:var(--mono);font-size:11px;color:var(--text-muted);display:flex;gap:12px">
            ${item.created ? `<span>${relativeTime(item.created)}</span>` : ''}
            ${item.due_date ? `<span style="color:var(--warm)">due ${escapeHtml(item.due_date)}</span>` : ''}

        <div id="triage-edit" style="display:none;padding:20px;width:min(500px,calc(100% - 40px));background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow)">
          <label style="font-family:var(--mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px">Label</label>
          <input type="text" id="triage-edit-label" value="${escapeHtml(item.label || '')}" style="width:100%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:12px;outline:none" />
          <label style="font-family:var(--mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px">Content</label>
          <textarea id="triage-edit-content" rows="4" style="width:100%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:12px;outline:none;resize:vertical;min-height:80px">${escapeHtml(item.content || '')}</textarea>

          <div class="triage-type-pills" id="triage-type-pills">
            ${['note','idea','url','paper','project','task','image','appointment'].map(t =>
              `<button class="triage-type-pill${t === item.type ? ' active' : ''}" data-type="${t}">${t}</button>`
            ).join('')}

        <button class="process-btn delete" data-action="delete">Delete (D)</button>
      </div>

    </div>

  // Wire action buttons
  container.querySelectorAll('.process-btn[data-action]').forEach(btn => {
    btn.addEventListener('click', () => triageAction(btn.dataset.action));
  });

  // Wire edit form
  const editCancel = document.getElementById('triage-edit-cancel');
  const editSave = document.getElementById('triage-edit-save');
  if (editCancel) editCancel.addEventListener('click', () => {
    document.getElementById('triage-edit').style.display = 'none';
    document.getElementById('process-card').style.display = 'block';
    document.getElementById('process-actions').style.display = 'flex';
    triageState.isEditing = false;
  });
  if (editSave) editSave.addEventListener('click', async () => {
    const newLabel = document.getElementById('triage-edit-label').value.trim();
    const newContent = document.getElementById('triage-edit-content').value.trim();
    const activePill = container.querySelector('.triage-type-pill.active');
    const newType = activePill ? activePill.dataset.type : item.type;
    await api(`/api/node/${item.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ label: newLabel, content: newContent, node_type: newType, status: 'permanent' })
    });
    triageState.isEditing = false;
    triageAdvance('promote');
  });

  // Wire type pills
  container.querySelectorAll('.triage-type-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      container.querySelectorAll('.triage-type-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });
  });

  // Touch swipe gestures
  setupTriageSwipe(container.querySelector('#triage-card-wrapper'));
}

function setupTriageSwipe(el) {
  if (!el) return;
  let startX = 0, startY = 0, swiping = false;
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (!swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const threshold = 80;
    if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0) triageAction('promote');  // swipe right = promote
      else triageAction('skip');  // swipe left = skip
    } else if (dy < -threshold && Math.abs(dy) > Math.abs(dx)) {
      triageAction('delete');  // swipe up = delete
    }
  }, { passive: true });
}

async function triageAction(action) {
  const { items, index } = triageState;
  if (index >= items.length) return;
  const item = items[index];
  const card = document.getElementById('process-card');

  if (action === 'edit') {
    triageState.isEditing = true;
    if (card) card.style.display = 'none';
    const editForm = document.getElementById('triage-edit');
    if (editForm) editForm.style.display = 'block';
    const actionsEl = document.getElementById('process-actions');
    if (actionsEl) actionsEl.style.display = 'none';
    return;
  }

  // Animate card exit
  if (card) {
    if (action === 'promote' || action === 'star-promote') card.className = 'swipe-right';
    else if (action === 'skip') card.className = 'swipe-left';
    else if (action === 'delete') card.className = 'swipe-up';
  }

  // API call
  if (action === 'promote') {
    await api(`/api/node/${item.id}`, { method: 'PATCH', body: JSON.stringify({ status: 'permanent' }) });
    triageState.undoStack.push({ action, item, prevStatus: 'inbox' });
    showTriageUndo('Promoted', item);
  } else if (action === 'star-promote') {
    await api(`/api/node/${item.id}`, { method: 'PATCH', body: JSON.stringify({ status: 'permanent', starred: true }) });
    triageState.undoStack.push({ action, item, prevStatus: 'inbox' });
    showTriageUndo('Starred & promoted', item);
  } else if (action === 'skip') {
    triageState.undoStack.push({ action, item });
  } else if (action === 'delete') {
    await api(`/api/node/${item.id}`, { method: 'DELETE' });
    triageState.undoStack.push({ action, item });
    showTriageUndo('Deleted', item);
  }

  // Wait for animation then advance
  setTimeout(() => triageAdvance(action), 300);
}

function triageAdvance(action) {
  triageState.index++;
  triageState.isEditing = false;
  showTriageItem();
}

function showTriageUndo(actionLabel, item) {
  clearTimeout(_triageUndoTimer);
  const undo = document.getElementById('triage-undo');
  const text = document.getElementById('triage-undo-text');
  if (!undo || !text) return;
  text.textContent = `${actionLabel}: ${(item.label || '').slice(0, 30)}`;
  undo.classList.add('open');

  const undoBtn = document.getElementById('triage-undo-btn');
  const newBtn = undoBtn.cloneNode(true);
  undoBtn.parentNode.replaceChild(newBtn, undoBtn);
  newBtn.id = 'triage-undo-btn';
  newBtn.addEventListener('click', async () => {
    const last = triageState.undoStack.pop();
    if (!last) return;
    if (last.action === 'delete') {
      // Can't truly undo a delete without re-creating, just note it
    } else if (last.action === 'promote' || last.action === 'star-promote') {
      await api(`/api/node/${last.item.id}`, { method: 'PATCH', body: JSON.stringify({ status: 'inbox', starred: false }) });
    }
    undo.classList.remove('open');
    clearTimeout(_triageUndoTimer);
    // Go back to that item
    triageState.index = Math.max(0, triageState.index - 1);
    showTriageItem();
  });

  _triageUndoTimer = setTimeout(() => undo.classList.remove('open'), 4000);
}

function exitTriage() {
  triageState.active = false;
  triageState.isEditing = false;
  loadGraph();
  switchView(previousView === 'triage' ? 'stream' : previousView);
}

// Triage keyboard handler
document.addEventListener('keydown', e => {
  if (currentView !== 'triage' || !triageState.active) return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (triageState.isEditing) {
    if (e.key === 'Escape') {
      e.preventDefault();
      document.getElementById('triage-edit-cancel')?.click();
    }
    return;
  }
  if (e.key === 'p' || e.key === 'P') { e.preventDefault(); triageAction('promote'); }
  else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); triageAction('star-promote'); }
  else if (e.key === 's' || e.key === 'S') { e.preventDefault(); triageAction('skip'); }
  else if (e.key === 'd' || e.key === 'D') { e.preventDefault(); triageAction('delete'); }
  else if (e.key === 'e' || e.key === 'E') { e.preventDefault(); triageAction('edit'); }
  else if (e.key === 'Escape') { e.preventDefault(); exitTriage(); }
});

// ─── Reset Button ────────────────────────
document.getElementById('reset-btn').addEventListener('click', async () => {
  const first = confirm('Reset the entire database? This deletes ALL nodes and edges.');
  if (!first) return;
  const second = confirm('Are you SURE? This cannot be undone.');
  if (!second) return;
  setLoading(true);
  const data = await api('/api/reset?confirm=yes', { method: 'DELETE' });
  setLoading(false);
  if (data?.status === 'reset') {
    toast('Database reset — fresh start');
    await loadGraph();
  } else {
    toast('Reset failed', 'error');
  }
});

// ─── Main Loop ────────────────────────────
function loop() {
  simulate();
  draw();
  requestAnimationFrame(loop);
}

  threeScene.add(pointLight);

  const pointLight2 = new THREE.PointLight(0xa78bfa, 0.5, 1200);
  pointLight2.position.set(-200, -100, -200);
  threeScene.add(pointLight2);

  // Shared geometry
  sphereGeometry = new THREE.SphereGeometry(1, 16, 12);

  // Subtle grid reference plane
  const gridHelper = new THREE.GridHelper(800, 20, 0x1a1a2e, 0x12121a);
  gridHelper.position.y = -150;
  threeScene.add(gridHelper);

  // --- Mouse orbit controls ---
  const domEl = threeRenderer.domElement;

  domEl.addEventListener('mousedown', (e) => {
    orbitState.mouseMoved = 0;
    orbitState.lastX = e.clientX;
    orbitState.lastY = e.clientY;
    if (e.button === 0) {
      orbitState.isRotating = true;
    } else if (e.button === 2) {
      orbitState.isPanning = true;
    }
    e.preventDefault();
  });

  domEl.addEventListener('mousemove', (e) => {
    const dx = e.clientX - orbitState.lastX;
    const dy = e.clientY - orbitState.lastY;
    orbitState.mouseMoved += Math.abs(dx) + Math.abs(dy);
    orbitState.lastX = e.clientX;
    orbitState.lastY = e.clientY;

    if (orbitState.isRotating) {
      orbitState.theta -= dx * 0.005;
      orbitState.phi -= dy * 0.005;
      orbitState.phi = Math.max(0.05, Math.min(Math.PI - 0.05, orbitState.phi));
      updateCameraFromOrbit();
    }

    if (orbitState.isPanning) {
      const panSpeed = orbitState.radius * 0.001;
      const right = new THREE.Vector3();
      const up = new THREE.Vector3();
      right.setFromMatrixColumn(threeCamera.matrixWorld, 0);
      up.setFromMatrixColumn(threeCamera.matrixWorld, 1);
      orbitState.targetVec.addScaledVector(right, -dx * panSpeed);
      orbitState.targetVec.addScaledVector(up, dy * panSpeed);
      updateCameraFromOrbit();
    }
  });

  domEl.addEventListener('mouseup', (e) => {
    if (e.button === 0 && orbitState.mouseMoved < 5) {
      const hit = hitTest3D(e.clientX, e.clientY);
      if (hit) openDetail(hit);
    }
    orbitState.isRotating = false;
    orbitState.isPanning = false;
  });

  domEl.addEventListener('wheel', (e) => {
    e.preventDefault();
    orbitState.radius *= e.deltaY > 0 ? 1.08 : 0.92;
    orbitState.radius = Math.max(50, Math.min(3000, orbitState.radius));
    updateCameraFromOrbit();
  }, { passive: false });

  domEl.addEventListener('contextmenu', (e) => e.preventDefault());

  // --- Touch orbit controls ---
  let touchOrbitData = {};
  domEl.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchOrbitData.moved = 0;
    if (e.touches.length === 1) {
      touchOrbitData.lastX = e.touches[0].clientX;
      touchOrbitData.lastY = e.touches[0].clientY;
      touchOrbitData.mode = 'rotate';
    } else if (e.touches.length === 2) {
      touchOrbitData.mode = 'pinch';
      touchOrbitData.pinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: false });

  domEl.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && touchOrbitData.mode === 'rotate') {
      const dx = e.touches[0].clientX - touchOrbitData.lastX;
      const dy = e.touches[0].clientY - touchOrbitData.lastY;
      touchOrbitData.moved += Math.abs(dx) + Math.abs(dy);
      touchOrbitData.lastX = e.touches[0].clientX;
      touchOrbitData.lastY = e.touches[0].clientY;
      orbitState.theta -= dx * 0.005;
      orbitState.phi -= dy * 0.005;
      orbitState.phi = Math.max(0.05, Math.min(Math.PI - 0.05, orbitState.phi));
      updateCameraFromOrbit();
    } else if (e.touches.length === 2 && touchOrbitData.mode === 'pinch') {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (touchOrbitData.pinchDist) {
        const scale = d / touchOrbitData.pinchDist;
        orbitState.radius /= scale;
        orbitState.radius = Math.max(50, Math.min(3000, orbitState.radius));
        updateCameraFromOrbit();
      }
      touchOrbitData.pinchDist = d;
    }
  }, { passive: false });

  domEl.addEventListener('touchend', (e) => {
    if (touchOrbitData.mode === 'rotate' && touchOrbitData.moved < 10 && e.changedTouches.length === 1) {
      const t = e.changedTouches[0];
      const hit = hitTest3D(t.clientX, t.clientY);
      if (hit) openDetail(hit);
    }
    touchOrbitData = {};
  });
}

function updateCameraFromOrbit() {
  if (!threeCamera) return;
  const s = orbitState;
  const t = s.targetVec || { x: 0, y: 0, z: 0 };
  threeCamera.position.set(
    t.x + s.radius * Math.sin(s.phi) * Math.sin(s.theta),
    t.y + s.radius * Math.cos(s.phi),
    t.z + s.radius * Math.sin(s.phi) * Math.cos(s.theta)
  );
  threeCamera.lookAt(t.x || 0, t.y || 0, t.z || 0);
}

function hexToThreeColor(hex) {
  return new THREE.Color(hex);
}

function sync3DGraph() {
  if (!threeScene) return;

  // Remove old meshes
  for (const id in nodeMeshes) {
    threeScene.remove(nodeMeshes[id]);
    if (nodeMeshes[id].geometry !== sphereGeometry) {
      nodeMeshes[id].geometry.dispose();
    }
    nodeMeshes[id].material.dispose();
  }
  nodeMeshes = {};

  // Remove old edge lines
  for (const id in edgeLines) {
    threeScene.remove(edgeLines[id]);
    edgeLines[id].geometry.dispose();
    edgeLines[id].material.dispose();
  }
  edgeLines = {};

  // Create node meshes
  for (const n of nodes) {
    const color = hexToThreeColor(n.color);
    const temp = n.temperature || 1;
    const scale = n.radius * 0.6;

    const material = new THREE.MeshPhongMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.1 + Math.min(0.5, (temp - 0.5) * 0.3),
      shininess: 60,
      transparent: true,
      opacity: 0.3 + Math.min(0.6, temp * 0.3),
    });

    const mesh = new THREE.Mesh(sphereGeometry, material);
    mesh.scale.set(scale, scale, scale);
    mesh.position.set(n.x, -n.y, n.z);
    mesh.userData.nodeId = n.id;
    threeScene.add(mesh);
    nodeMeshes[n.id] = mesh;

    // Glow sprite for hot / starred nodes
    if (temp > 1.2 || n.starred) {
      const spriteMat = new THREE.SpriteMaterial({
        color: color,
        transparent: true,
        opacity: 0.15 + (temp > 1.2 ? 0.1 : 0),
        blending: THREE.AdditiveBlending,
      });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.scale.set(scale * 4, scale * 4, 1);
      mesh.add(sprite);
    }
  }

  // Create edge lines
  for (const e of edges) {
    const a = e.sourceNode, b = e.targetNode;
    if (!a || !b) continue;

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    positions[0] = a.x; positions[1] = -a.y; positions[2] = a.z;
    positions[3] = b.x; positions[4] = -b.y; positions[5] = b.z;
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const weight = e.weight || 0.5;
    const material = new THREE.LineBasicMaterial({
      color: 0x4a4a62,
      transparent: true,
      opacity: 0.1 + weight * 0.25,
    });

    const line = new THREE.Line(geometry, material);
    threeScene.add(line);
    edgeLines[e.id] = line;
  }
}

function hitTest3D(clientX, clientY) {
  if (!threeCamera || !threeRenderer) return null;

  const rect = threeRenderer.domElement.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((clientX - rect.left) / rect.width) * 2 - 1,
    -((clientY - rect.top) / rect.height) * 2 + 1
  );

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, threeCamera);

  const meshArray = Object.values(nodeMeshes);
  const intersects = raycaster.intersectObjects(meshArray, false);

  if (intersects.length > 0) {
    const nodeId = intersects[0].object.userData.nodeId;
    return nodeMap[nodeId] || null;
  }
  return null;
}

function animate3D() {
  if (!is3D) return;
  threeAnimFrameId = requestAnimationFrame(animate3D);

  simulate();

  // Update mesh positions from node state
  for (const n of nodes) {
    const mesh = nodeMeshes[n.id];
    if (mesh) {
      mesh.position.set(n.x, -n.y, n.z);

      // Pulse effect for inbox nodes
      if (n.status === 'inbox') {
        const pulse = 1 + Math.sin(Date.now() * 0.003 + n.x) * 0.08;
        const s = n.radius * 0.6 * pulse;
        mesh.scale.set(s, s, s);
      }
    }
  }

  // Update edge line positions
  for (const e of edges) {
    const line = edgeLines[e.id];
    if (!line) continue;
    const a = e.sourceNode, b = e.targetNode;
    if (!a || !b) continue;

    const pos = line.geometry.attributes.position.array;
    pos[0] = a.x; pos[1] = -a.y; pos[2] = a.z;
    pos[3] = b.x; pos[4] = -b.y; pos[5] = b.z;
    line.geometry.attributes.position.needsUpdate = true;

    // Highlight edges connected to selected node
    const isHighlighted = selectedNode &&
      (e.source === selectedNode.id || e.target === selectedNode.id);
    if (isHighlighted) {
      line.material.color.set(0x6ee7b7);
      line.material.opacity = 0.4 + (e.weight || 0.5) * 0.4;
    } else {
      line.material.color.set(0x4a4a62);
      line.material.opacity = 0.1 + (e.weight || 0.5) * 0.25;
    }
  }

  threeRenderer.render(threeScene, threeCamera);
}

// ─── 3D Toggle Handler ────────────────────
document.getElementById('toggle-3d').addEventListener('click', () => {
  is3D = !is3D;
  const btn = document.getElementById('toggle-3d');
  const container = document.getElementById('three-container');

  btn.classList.toggle('active', is3D);

  if (is3D) {
    // Switch to 3D
    canvas.style.display = 'none';
    container.style.display = 'block';

    if (!three3DInitialized) {
      init3D();
    }

    sync3DGraph();
    simAlpha = 1.0;
    animate3D();
  } else {
    // Switch back to 2D
    container.style.display = 'none';
    canvas.style.display = 'block';

    if (threeAnimFrameId) {
      cancelAnimationFrame(threeAnimFrameId);
      threeAnimFrameId = null;
    }

    simAlpha = 1.0;
    loop();
  }
});

// Observe graph data changes to sync 3D view
const _statNodesEl = document.getElementById('stat-nodes');
const _graphObserver = new MutationObserver(() => {
  if (is3D && threeScene) {
    sync3DGraph();
  }
});
_graphObserver.observe(_statNodesEl, { childList: true, characterData: true, subtree: true });
3D DISABLED */

// ─── Init ─────────────────────────────────
resize();
window.addEventListener('resize', resize);
const savedView = localStorage.getItem('om-view') || 'stream';
loadGraph().then(() => {
  // Center camera on graph centroid
  if (nodes.length) {
    let cx = 0, cy = 0;
    nodes.forEach(n => { cx += n.x; cy += n.y; });
    targetCam.x = cx / nodes.length;
    targetCam.y = cy / nodes.length;
  }
  // Apply initial view (focus can't be default — needs a node)
  switchView(savedView === 'focus' ? 'stream' : savedView);
  loop();
});

// Periodically refresh
setInterval(loadGraph, 60000);
