<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Open Mind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --surface: #1e1e2e;
  --border: #2a2a3e;
  --text: #e0dfe8;
  --text-dim: #7a7a92;
  --text-muted: #4a4a62;
  --accent: #6ee7b7;
  --accent2: #34d399;
  --accent-dim: rgba(110, 231, 183, 0.15);
  --warm: #fbbf24;
  --hot: #f97316;
  --cool: #60a5fa;
  --idea: #a78bfa;
  --url: #38bdf8;
  --paper: #fb923c;
  --project: #4ade80;
  --task: #f472b6;
  --image-c: #e879f9;
  --daily: #94a3b8;
  --inbox-pulse: rgba(110, 231, 183, 0.4);
  /* Edge relationship type colors */
  --edge-supports: #4ade80;
  --edge-contradicts: #f87171;
  --edge-extends: #60a5fa;
  --edge-is-part-of: #a78bfa;
  --edge-inspired-by: #fbbf24;
  --edge-similar-to: #94a3b8;
  --edge-implements: #2dd4bf;
  --edge-questions: #fb923c;
  --edge-summarizes: #e879f9;
  --edge-example-of: #38bdf8;
  --edge-discusses: #818cf8;
  --edge-related: #4a4a62;
  --font: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  width: 100%; height: 100%; overflow: hidden;
  font-family: var(--font); background: var(--bg); color: var(--text);
}

::selection { background: var(--accent); color: var(--bg); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Canvas ─────────────────────────────── */
#graph-canvas {
  position: absolute; inset: 0;
  cursor: grab;
}
#graph-canvas.dragging { cursor: grabbing; }
#graph-canvas.node-hover { cursor: pointer; }

/* ─── Top Bar ────────────────────────────── */
#top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px;
  display: flex; align-items: center;
  padding: 0 20px;
  background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
  z-index: 100;
  pointer-events: none;
}
#top-bar > * { pointer-events: all; }

.logo {
  font-weight: 700; font-size: 15px;
  letter-spacing: -0.5px;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse-dot 3s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.8); }
}

#stats-bar {
  margin-left: auto;
  display: flex; gap: 16px; align-items: center;
  font-family: var(--mono); font-size: 11px;
  color: var(--text-dim);
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

/* ─── Input Bar ──────────────────────────── */
#input-area {
  position: fixed; bottom: 24px;
  left: 50%; transform: translateX(-50%);
  width: min(640px, calc(100% - 40px));
  z-index: 200;
}

#input-wrapper {
  display: flex; align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 4px 6px 4px 18px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(110,231,183,0.05);
  transition: border-color 0.3s, box-shadow 0.3s;
}
#input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: var(--shadow), 0 0 20px rgba(110,231,183,0.1);
}

#main-input {
  flex: 1; border: none; outline: none;
  background: transparent; color: var(--text);
  font-family: var(--font); font-size: 14px;
  padding: 10px 0;
  font-weight: 400;
}
#main-input::placeholder { color: var(--text-muted); }

.input-btn {
  width: 36px; height: 36px; border-radius: 10px;
  border: none; background: transparent;
  color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.input-btn:hover { background: var(--accent-dim); color: var(--accent); }
.input-btn.recording { 
  background: rgba(239,68,68,0.2); color: #ef4444;
  animation: rec-pulse 1s ease-in-out infinite;
}
@keyframes rec-pulse {
  0%, 100% { box-shadow: none; }
  50% { box-shadow: 0 0 12px rgba(239,68,68,0.3); }
}

#send-btn {
  background: var(--accent); color: var(--bg);
  border-radius: 10px;
}
#send-btn:hover { background: var(--accent2); }

/* ─── Hints ──────────────────────────────── */
#input-hints {
  display: flex; gap: 6px; margin-top: 8px;
  justify-content: center; flex-wrap: wrap;
}
.hint-chip {
  font-size: 11px; font-family: var(--mono);
  color: var(--text-muted);
  background: rgba(30,30,46,0.7);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px 10px;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.hint-chip:hover {
  color: var(--accent); border-color: var(--accent);
  background: var(--accent-dim);
}

/* ─── Detail Panel ───────────────────────── */
#detail-panel {
  position: fixed; top: 0; right: -400px; bottom: 0;
  width: 380px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 300;
  transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 32px rgba(0,0,0,0.5);
}
#detail-panel.open { right: 0; }

#detail-header {
  display: flex; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
#detail-type-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 4px;
  background: var(--accent-dim); color: var(--accent);
}
#detail-close {
  margin-left: auto;
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
#detail-close:hover { background: var(--surface); color: var(--text); }

#detail-body {
  flex: 1; overflow-y: auto;
  padding: 20px;
}

#detail-label {
  font-size: 18px; font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.3;
}
#detail-meta {
  font-size: 13px; line-height: 1.5;
  color: var(--text);
  margin-bottom: 16px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; gap: 14px; flex-wrap: wrap;
}
#detail-meta .meta-item {
  display: flex; align-items: center; gap: 5px;
}
#detail-meta .meta-label {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted);
}
#detail-meta .meta-value {
  font-weight: 500;
}
#detail-content {
  font-size: 13.5px; line-height: 1.7;
  color: var(--text-dim);
  margin-bottom: 10px;
  white-space: pre-wrap;
  word-break: break-word;
}
#detail-url {
  display: none;
  font-family: var(--mono); font-size: 12px;
  color: var(--url);
  text-decoration: none;
  margin-bottom: 10px;
  word-break: break-all;
}
#detail-url:hover { text-decoration: underline; }

#detail-image {
  display: none;
  width: 100%; border-radius: var(--radius);
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
#detail-archive {
  display: none;
  font-family: var(--mono); font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  margin-bottom: 16px;
  cursor: pointer;
}
#detail-archive:hover { text-decoration: underline; }
#detail-pdf {
  display: none;
  font-family: var(--mono); font-size: 12px;
  color: #fb923c;
  text-decoration: none;
  margin-bottom: 16px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
#detail-pdf:hover { border-color: #fb923c; background: rgba(251,146,60,0.1); }
#detail-user-notes {
  display: none;
  font-size: 13px; line-height: 1.5;
  color: var(--text);
  margin-bottom: 12px;
  padding: 10px 12px;
  background: rgba(110, 231, 183, 0.06);
  border-radius: var(--radius);
  border: 1px solid rgba(110, 231, 183, 0.15);
  font-style: italic;
}
#detail-user-notes::before {
  content: 'Note: ';
  font-weight: 500;
  font-style: normal;
  color: var(--accent);
}
#detail-img-description {
  display: none;
  font-size: 12px; line-height: 1.6;
  color: var(--text-dim);
  margin-bottom: 16px;
  padding: 10px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
#detail-similar-images h4 {
  font-size: 11px; font-family: var(--mono);
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1px; margin: 16px 0 10px;
}
.sim-img-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.sim-img-item {
  cursor: pointer; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border); aspect-ratio: 1;
  position: relative; transition: border-color 0.2s;
}
.sim-img-item:hover { border-color: var(--accent); }
.sim-img-item img { width: 100%; height: 100%; object-fit: cover; }
.sim-img-score {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 2px 4px; background: rgba(0,0,0,0.7);
  font-size: 9px; font-family: var(--mono); color: var(--text-dim);
}

#detail-connections {
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
#detail-connections h4 {
  font-size: 11px; font-family: var(--mono);
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 10px;
}
.conn-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; margin-bottom: 4px;
  border-radius: 6px; cursor: pointer;
  transition: background 0.2s;
  font-size: 13px;
}
.conn-item:hover { background: var(--surface); }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.conn-label { color: var(--text-dim); font-family: var(--mono); font-size: 10px; margin-left: auto; }

/* Edge type dropdown */
.edge-type-dropdown {
  position: fixed;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  box-shadow: var(--shadow);
  min-width: 150px;
}
.edge-type-option {
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.15s;
}
.edge-type-option:hover { background: var(--surface); }
.edge-type-option.active { background: var(--accent-dim); font-weight: 500; }

/* Detail actions */
#detail-actions {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.action-btn {
  font-family: var(--mono); font-size: 11px;
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.action-btn.danger:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }

/* ─── Command Palette ────────────────────── */
#cmd-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none; align-items: flex-start; justify-content: center;
  padding-top: 20vh;
}
#cmd-overlay.open { display: flex; }

#cmd-palette {
  width: min(500px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
#cmd-input {
  width: 100%; border: none; outline: none;
  background: transparent; color: var(--text);
  font-family: var(--mono); font-size: 14px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
#cmd-input::placeholder { color: var(--text-muted); }
#cmd-results {
  max-height: 300px; overflow-y: auto;
  padding: 6px;
}
.cmd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  cursor: pointer; transition: background 0.15s;
  font-size: 13px;
}
.cmd-item:hover, .cmd-item.active { background: var(--accent-dim); }
.cmd-item-type {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-muted); text-transform: uppercase;
}

/* ─── Toast ──────────────────────────────── */
#toast-container {
  position: fixed; top: 60px; right: 20px;
  z-index: 600;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 13px;
  box-shadow: var(--shadow);
  animation: toast-in 0.3s ease-out;
  max-width: 320px;
}
.toast.success { border-left: 3px solid var(--accent); }
.toast.error { border-left: 3px solid #ef4444; }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── Search Results Overlay ─────────────── */
#search-overlay {
  position: fixed; bottom: 100px;
  left: 50%; transform: translateX(-50%);
  width: min(600px, calc(100% - 40px));
  max-height: 350px; overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  z-index: 190;
  display: none;
  padding: 8px;
}
#search-overlay.open { display: block; }

/* ─── Ask Panel ─────────────────────────── */
#ask-overlay {
  position: fixed; bottom: 100px;
  left: 50%; transform: translateX(-50%);
  width: min(680px, calc(100% - 40px));
  max-height: calc(100vh - 180px);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow), 0 0 40px rgba(0,0,0,0.3);
  z-index: 195;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#ask-overlay.open { display: flex; }

#ask-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
#ask-header h3 {
  font-size: 13px; font-weight: 600; color: var(--accent);
  letter-spacing: 0.5px; text-transform: uppercase;
}
#ask-close {
  width: 28px; height: 28px; border-radius: 8px;
  border: none; background: transparent;
  color: var(--text-muted); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
#ask-close:hover { background: var(--surface); color: var(--text); }

#ask-messages {
  flex: 1; overflow-y: auto;
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 16px;
}

.ask-msg {
  max-width: 100%;
}
.ask-msg.user {
  align-self: flex-end;
  background: var(--accent-dim);
  border: 1px solid rgba(110,231,183,0.2);
  border-radius: 14px 14px 4px 14px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  max-width: 85%;
}
.ask-msg.assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
}
.ask-msg.assistant p { margin: 0 0 8px 0; }
.ask-msg.assistant p:last-child { margin-bottom: 0; }
.ask-msg.assistant ul, .ask-msg.assistant ol { margin: 4px 0 8px 20px; }
.ask-msg.assistant li { margin-bottom: 4px; }
.ask-msg.assistant code {
  font-family: var(--mono); font-size: 12px;
  background: rgba(110,231,183,0.1); padding: 1px 5px;
  border-radius: 4px; color: var(--accent);
}
.ask-msg.assistant strong { color: var(--accent); font-weight: 600; }

.ask-sources {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.ask-source-chip {
  font-size: 11px; font-family: var(--mono);
  background: var(--accent-dim);
  border: 1px solid rgba(110,231,183,0.2);
  border-radius: 6px;
  padding: 3px 10px;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s;
}
.ask-source-chip:hover {
  background: var(--accent); color: var(--bg);
}

.ask-actions {
  display: flex; gap: 8px; margin-top: 10px;
}
.ask-save-btn {
  font-size: 11px; font-family: var(--font);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.ask-save-btn:hover {
  border-color: var(--accent); color: var(--accent);
}

.ask-loading {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  color: var(--text-muted); font-size: 13px;
}
.ask-loading .spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#ask-input-area {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
#ask-input {
  flex: 1; border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 13px;
  padding: 8px 14px;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s;
}
#ask-input:focus { border-color: var(--accent); }
#ask-input::placeholder { color: var(--text-muted); }
#ask-send {
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: var(--bg);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
#ask-send:hover { background: var(--accent2); }
#ask-send:disabled { opacity: 0.5; cursor: default; }

/* ─── Chat Panel ─────────────────────────── */
#chat-panel {
  position: fixed; top: 0; right: -440px; bottom: 0;
  width: 420px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 290;
  transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 32px rgba(0,0,0,0.5);
}
#chat-panel.open { right: 0; }

#chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
#chat-header h3 {
  font-size: 13px; font-weight: 600; color: var(--accent);
  letter-spacing: 0.5px; text-transform: uppercase;
}
#chat-close {
  width: 28px; height: 28px; border-radius: 8px;
  border: none; background: transparent;
  color: var(--text-muted); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
#chat-close:hover { background: var(--surface); color: var(--text); }

#chat-nodes {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  max-height: 100px; overflow-y: auto;
  flex-shrink: 0;
}
.chat-node-chip {
  font-size: 11px; font-family: var(--mono);
  background: var(--accent-dim);
  border: 1px solid rgba(110,231,183,0.2);
  border-radius: 6px;
  padding: 3px 8px 3px 10px;
  color: var(--accent);
  display: flex; align-items: center; gap: 4px;
  cursor: default;
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-node-chip .chip-remove {
  cursor: pointer; opacity: 0.5; font-size: 10px;
  padding: 0 2px;
  transition: opacity 0.2s;
}
.chat-node-chip .chip-remove:hover { opacity: 1; }

#chat-quick-actions {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-quick-btn {
  font-size: 11px; font-family: var(--font);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.chat-quick-btn:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-dim);
}

#chat-messages {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}

/* Reuse ask-msg styles for chat messages */
.chat-msg { max-width: 100%; }
.chat-msg.user {
  align-self: flex-end;
  background: var(--accent-dim);
  border: 1px solid rgba(110,231,183,0.2);
  border-radius: 14px 14px 4px 14px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  max-width: 85%;
}
.chat-msg.assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
}
.chat-msg.assistant p { margin: 0 0 8px 0; }
.chat-msg.assistant p:last-child { margin-bottom: 0; }
.chat-msg.assistant ul, .chat-msg.assistant ol { margin: 4px 0 8px 20px; }
.chat-msg.assistant li { margin-bottom: 4px; }
.chat-msg.assistant code {
  font-family: var(--mono); font-size: 12px;
  background: rgba(110,231,183,0.1); padding: 1px 5px;
  border-radius: 4px; color: var(--accent);
}
.chat-msg.assistant strong { color: var(--accent); font-weight: 600; }

.chat-msg-actions {
  display: flex; gap: 8px; margin-top: 10px;
}
.chat-save-btn {
  font-size: 11px; font-family: var(--font);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.chat-save-btn:hover {
  border-color: var(--accent); color: var(--accent);
}

.chat-loading {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  color: var(--text-muted); font-size: 13px;
}
.chat-loading .spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

#chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
  flex-shrink: 0;
}
#chat-input {
  flex: 1; border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 13px;
  padding: 8px 14px;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text-muted); }
#chat-send {
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: var(--bg);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
#chat-send:hover { background: var(--accent2); }
#chat-send:disabled { opacity: 0.5; cursor: default; }

/* Canvas Chat button */
#canvas-chat-btn {
  font-size: 11px; font-family: var(--font);
  background: var(--accent-dim);
  border: 1px solid rgba(110,231,183,0.2);
  border-radius: 6px;
  padding: 4px 12px;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s;
  margin-left: auto;
  display: none;
}
#canvas-chat-btn:hover {
  background: rgba(110,231,183,0.2);
  border-color: var(--accent);
}

/* Selection mode for Stream view */
.stream-card.selectable {
  cursor: pointer;
  position: relative;
}
.stream-card.selectable::before {
  content: '';
  position: absolute;
  top: 10px; left: 10px;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  transition: all 0.2s;
}
.stream-card.selected::before {
  background: var(--accent);
  border-color: var(--accent);
}
.stream-card.selected::after {
  content: '\2713';
  position: absolute;
  top: 10px; left: 14px;
  font-size: 12px;
  color: var(--bg);
  font-weight: 700;
}

/* Floating action bar for selection */
#selection-bar {
  position: fixed; bottom: 90px;
  left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 14px;
  padding: 8px 16px;
  display: none; align-items: center; gap: 12px;
  z-index: 190;
  box-shadow: var(--shadow), 0 0 20px rgba(110,231,183,0.1);
  font-size: 13px;
}
#selection-bar.visible { display: flex; }
#selection-bar .sel-count {
  color: var(--accent); font-family: var(--mono); font-size: 12px;
}
#selection-bar button {
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 8px;
  padding: 6px 14px; font-size: 12px;
  font-family: var(--font); font-weight: 500;
  cursor: pointer; transition: background 0.2s;
}
#selection-bar button:hover { background: var(--accent2); }
#selection-bar .sel-cancel {
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border);
}
#selection-bar .sel-cancel:hover {
  color: var(--text); border-color: var(--text-dim);
}

.search-result {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  cursor: pointer; transition: background 0.15s;
}
.search-result:hover { background: var(--accent-dim); }
.search-result-label { font-size: 13px; font-weight: 500; }
.search-result-snippet { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.search-result-score {
  margin-left: auto; font-family: var(--mono);
  font-size: 10px; color: var(--text-muted);
}

/* ─── Loading ────────────────────────────── */
.loading-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent);
  z-index: 999;
  animation: loading-sweep 1.5s ease-in-out infinite;
  display: none;
}
.loading-bar.active { display: block; }
@keyframes loading-sweep {
  0% { transform: translateX(-100%); }
  50% { transform: translateX(0%); }
  100% { transform: translateX(100%); }
}

/* ─── Drop zone ──────────────────────────── */
#drop-zone {
  position: fixed; inset: 0;
  background: rgba(110,231,183,0.05);
  border: 3px dashed var(--accent);
  z-index: 400;
  display: none;
  align-items: center; justify-content: center;
  font-size: 18px; font-weight: 500;
  color: var(--accent);
}
#drop-zone.active { display: flex; }
/* ─── 3D Toggle Button ───────────────────── */
#toggle-3d {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.5px;
}
#toggle-3d:hover { border-color: var(--accent); color: var(--accent); }
#toggle-3d.active {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(110, 231, 183, 0.3);
}

/* ─── View Tabs ────────────────────────── */
.view-tabs {
  display: inline-flex; gap: 2px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 2px;
  margin-left: 16px;
}
.view-tab {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 5px 14px; border: none; border-radius: 8px;
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.5px;
  white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.view-tab:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.view-tab.active {
  background: var(--accent); color: var(--bg); font-weight: 700;
}
.view-tab:disabled {
  opacity: 0.3; cursor: not-allowed;
}
.view-tab:disabled:hover { background: transparent; color: var(--text-dim); }
.view-tab svg { width: 14px; height: 14px; flex-shrink: 0; }
.view-tab-label { }
#inbox-badge {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 5px 14px; border: none; border-radius: 8px;
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
  margin-left: 4px;
}
#inbox-badge:hover { background: rgba(255,255,255,0.08); color: var(--warm); }
#inbox-badge.has-items {
  color: var(--warm); border: 1px solid rgba(251,191,36,0.3);
  background: rgba(251,191,36,0.08);
}
.badge-count {
  font-size: 10px; font-weight: 700;
  background: var(--warm); color: var(--bg);
  border-radius: 8px; padding: 0 5px; min-width: 16px;
  text-align: center; line-height: 16px;
}

/* ─── View Layers ──────────────────────── */
.view-layer {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  background: var(--bg);
  display: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  z-index: 50;
}
.view-layer.active {
  display: block;
  opacity: 1;
}

@media (max-width: 640px) {
  .view-tab-label { display: none; }
  .view-tab { padding: 5px 10px; }
  #inbox-badge .badge-count { display: inline; }
}
@media (max-width: 480px) {
  .view-tabs {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    z-index: 150; background: var(--surface);
    box-shadow: var(--shadow);
    border-radius: 14px; padding: 3px;
  }
  #inbox-badge {
    position: fixed; bottom: 80px; right: 16px;
    z-index: 150; background: var(--surface);
    border-radius: 10px; padding: 6px 10px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
}

/* ─── Reset Button ──────────────────────── */
.topbar-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all 0.2s;
}
.topbar-btn:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }

/* ─── Add Dialog ────────────────────────── */
#add-dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none; align-items: flex-start; justify-content: center;
  padding-top: 20vh;
}
#add-dialog-overlay.open { display: flex; }
#add-dialog {
  width: min(440px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 20px;
}
#add-dialog h3 {
  font-size: 14px; font-weight: 500; margin-bottom: 16px; color: var(--text);
}
.add-option-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.add-option-row label {
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  width: 50px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px;
}
#add-url-input {
  flex: 1; border: 1px solid var(--border); outline: none;
  background: var(--bg2); color: var(--text);
  font-family: var(--font); font-size: 13px;
  padding: 8px 12px; border-radius: 8px;
}
#add-url-input:focus { border-color: var(--accent); }
#add-url-input::placeholder { color: var(--text-muted); }
.add-file-btn {
  flex: 1; padding: 10px; border-radius: 8px;
  border: 1px dashed var(--border); background: transparent;
  color: var(--text-dim); font-family: var(--font); font-size: 13px;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.add-file-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.add-dialog-actions {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
}
.add-dialog-btn {
  font-family: var(--font); font-size: 13px;
  padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.add-dialog-btn:hover { border-color: var(--accent); color: var(--accent); }
.add-dialog-btn.primary {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent); font-weight: 500;
}
.add-dialog-btn.primary:hover { background: var(--accent2); }

/* ─── Note Prompt Modal ──────────────────── */
#note-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none; align-items: flex-start; justify-content: center;
  padding-top: 20vh;
}
#note-modal-overlay.open { display: flex; }
#note-modal {
  width: min(480px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
#note-modal-header {
  padding: 16px 20px 12px;
  font-size: 14px; font-weight: 500;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
#note-modal-preview {
  font-size: 12px; color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1;
}
#note-modal-body { padding: 16px 20px; }
#note-modal-input {
  width: 100%; border: 1px solid var(--border); outline: none;
  background: var(--bg2); color: var(--text);
  font-family: var(--font); font-size: 13px;
  padding: 10px 14px; border-radius: 8px;
  resize: vertical; min-height: 60px; max-height: 150px;
}
#note-modal-input::placeholder { color: var(--text-muted); }
#note-modal-input:focus { border-color: var(--accent); }
#note-modal-actions {
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 0 20px 16px;
}
.note-modal-btn {
  font-family: var(--font); font-size: 13px;
  padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.note-modal-btn:hover { border-color: var(--accent); color: var(--accent); }
.note-modal-btn.primary {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent); font-weight: 500;
}
.note-modal-btn.primary:hover { background: var(--accent2); }

/* ─── Background Processing Toast ────────── */
.toast.processing {
  border-left: 3px solid var(--cool);
  display: flex; align-items: center; gap: 10px;
}
.toast.processing .spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--cool);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ─── Process Mode ──────────────────────── */
#process-overlay {
  position: fixed; inset: 0;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(12px);
  z-index: 500;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#process-overlay.open { display: flex; }

#process-progress {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

#process-card {
  width: min(500px, calc(100% - 40px));
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  box-shadow: var(--shadow);
}

#process-type-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--accent-dim);
  color: var(--accent);
  display: inline-block;
  margin-bottom: 12px;
}

#process-label {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.3;
  color: var(--text);
}

#process-content {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text-dim);
  margin-bottom: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
}

#process-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
}

#process-actions {
  display: flex;
  gap: 10px;
}

.process-btn {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-dim);
}

.process-btn.promote {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}
.process-btn.promote:hover {
  background: var(--accent);
  color: var(--bg);
}

.process-btn.skip {
  color: var(--text-muted);
}
.process-btn.skip:hover {
  border-color: var(--text-dim);
  color: var(--text-dim);
  background: rgba(122,122,146,0.1);
}

.process-btn.delete {
  border-color: #ef4444;
  color: #ef4444;
}
.process-btn.delete:hover {
  background: rgba(239,68,68,0.15);
}

#process-hint {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
}

/* ─── Stream View ─────────────────────── */
/* ─── Stream View: Master-Detail Layout ─── */
.stream-top-bar {
  position: sticky; top: 0; z-index: 10;
  padding: 56px 16px 8px;
  background: linear-gradient(180deg, var(--bg) 70%, transparent 100%);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.stream-filters {
  display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
}
.stream-chip {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.stream-chip:hover { color: var(--accent); border-color: var(--accent); }
.stream-chip.active {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent); font-weight: 700;
}
.stream-master-detail {
  display: flex;
  height: calc(100vh - 110px);
  overflow: hidden;
}
.stream-left {
  width: 32%;
  min-width: 300px;
  max-width: 420px;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  padding: 8px 10px 120px;
}
.stream-right {
  flex: 1;
  overflow-y: auto;
  padding: 16px 28px 120px;
}
#stream-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
/* ─── Monopoly Property Card (tall & narrow) ─── */
.stream-card {
  background: #faf6ed;
  border: 2px solid #1a1a1a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 1px 2px 6px rgba(0,0,0,0.4);
}
.stream-card:hover {
  transform: translateY(-2px);
  box-shadow: 2px 6px 16px rgba(0,0,0,0.5);
}
.stream-card.inbox {
  box-shadow: 0 0 0 2px var(--accent), 1px 2px 6px rgba(0,0,0,0.4);
}
.stream-card.stream-selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent), 0 0 16px rgba(110,231,183,0.25);
}
.stream-card-banner {
  height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 2px solid #1a1a1a;
  flex-shrink: 0;
}
.stream-card-banner-label {
  font-family: var(--mono); font-size: 8px;
  font-variant: small-caps; letter-spacing: 1.5px;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  font-weight: 600;
}
.stream-card-body {
  padding: 6px 8px 8px;
  display: flex; flex-direction: column;
  flex: 1; min-height: 0;
}
.stream-card-star {
  text-align: right; font-size: 12px; color: #d4a017;
  line-height: 1; margin-bottom: -2px;
}
.stream-card-label {
  font-size: 12px; font-weight: 700; color: #1a1a1a;
  text-align: center;
  margin: 2px 0 4px;
  line-height: 1.25;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.stream-card-thumb {

}
.stream-field-row .field-label { white-space: nowrap; }
.stream-field-row .field-dots {

.stream-field-row .field-value {

}
.stream-card-footer {

}
.stream-card-footer-left {

}
.stream-card-time {
  font-family: var(--mono); font-size: 9px; color: #7a7262;
}
.stream-empty {

/* ─── Stream Detail Panel (right side) ─── */
.sd-empty {
  text-align: center; padding: 80px 20px;
  color: var(--text-muted); font-size: 14px;

}
.sd-card {
  max-width: 640px;
}
.sd-banner {

}
.sd-banner-label {

}
.sd-media {

}
.sd-label[contenteditable="true"],
.sd-content[contenteditable="true"] {
  outline: 1px dashed var(--accent);
  border-radius: 4px; padding: 4px 6px;
}
.sd-url {
  font-family: var(--mono); font-size: 12px;
  color: var(--accent); display: block;
  margin-bottom: 8px; word-break: break-all;
  text-decoration: none;
}
.sd-url:hover { text-decoration: underline; }
.sd-content {
  font-size: 14px; color: var(--text-dim);
  line-height: 1.65; white-space: pre-wrap;
  margin: 10px 0 16px;
}
.sd-fields {
  background: #faf6ed;
  border: 2px solid #1a1a1a;
  border-radius: 6px;
  padding: 12px 16px;
  margin: 16px 0;
}
.sd-field-title {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: #1a1a1a; font-weight: 700;
  text-align: center; margin-bottom: 8px;
  border-bottom: 2px solid #1a1a1a;
  padding-bottom: 4px;
}
.sd-field-row {
  display: flex; align-items: baseline;
  font-family: var(--mono); font-size: 12px; color: #3a3525;
  padding: 3px 0;
}
.sd-field-row .field-label { white-space: nowrap; }
.sd-field-row .field-dots {
  flex: 1; border-bottom: 1px dotted #b5ad96;
  margin: 0 6px; min-width: 12px;
  position: relative; top: -2px;
}
.sd-field-row .field-value {
  white-space: nowrap; font-weight: 600; text-align: right;
}
.sd-connections { margin: 16px 0; }
.sd-connections-header {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 8px;
}
.sd-connection {
  display: flex; align-items: center; gap: 8px;

}
.sd-connection:hover {
  border-color: var(--accent);
  background: rgba(110,231,183,0.05);
}
.sd-connection-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sd-connection-label {
  font-size: 13px; color: var(--text); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sd-connection-type {
  font-family: var(--mono); font-size: 9px;
  color: var(--text-muted); text-transform: uppercase;
}
.sd-actions {
  display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0;
}
.sd-action-btn {
  font-family: var(--mono); font-size: 11px;
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.sd-action-btn:hover {
  border-color: var(--accent); color: var(--accent);
}
.sd-meta {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-muted); display: flex;
  gap: 16px; flex-wrap: wrap; margin-top: 16px;

}

@media (max-width: 768px) {
  .stream-master-detail { flex-direction: column; height: auto; }
  .stream-left {

  }
  .stream-right { padding: 12px 16px 120px; }
  #stream-list { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stream-card-label { font-size: 11px; }
  .stream-card-banner { height: 20px; }
  .stream-card-banner-label { font-size: 7px; }
}
@media (max-width: 480px) {

  .stream-top-bar { padding: 52px 10px 6px; }
  .stream-chip { font-size: 10px; padding: 3px 8px; }
  .sd-label { font-size: 18px; }
  .sd-field-row { font-size: 11px; }
}

/* ─── Rediscovery Section ────────────── */
.rediscovery-section {
  padding: 0 0 8px;
}
.rediscovery-header {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.8px; padding: 8px 0 6px;
  display: flex; align-items: center; gap: 6px;
}
.rediscovery-header::before {
  content: ''; display: inline-block;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--warm);
}
.rediscovery-cards {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 4px; scroll-snap-type: x mandatory;
}
.rediscovery-card {
  flex: 0 0 160px; scroll-snap-align: start;
  background: var(--surface);
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: var(--radius);
  padding: 12px; cursor: pointer;
  transition: all 0.2s; position: relative;
}
.rediscovery-card:hover {
  border-color: rgba(251,191,36,0.5);

}
.rediscovery-card-badge {
  font-family: var(--mono); font-size: 9px;
  color: var(--warm); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px;
}
.rediscovery-card-label {
  font-size: 13px; font-weight: 500; color: var(--text);
  margin-bottom: 4px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.rediscovery-card-preview {
  font-size: 11px; color: var(--text-dim);
  line-height: 1.4; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.rediscovery-card-meta {
  font-family: var(--mono); font-size: 9px;
  color: var(--text-muted); margin-top: 6px;
}
/* Serendipity card */
.serendipity-section {
  padding: 0 0 12px;
}
.serendipity-card {
  background: var(--surface);
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.serendipity-header {
  font-family: var(--mono); font-size: 11px;
  color: #a78bfa; text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.serendipity-header::before {
  content: ''; display: inline-block;
  width: 4px; height: 4px; border-radius: 50%;
  background: #a78bfa;
}
.serendipity-prompt {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.5; margin-bottom: 10px;
  font-style: italic;
}
.serendipity-nodes {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.serendipity-node {
  flex: 1; background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.15);
  border-radius: 8px; padding: 10px;
  cursor: pointer; transition: all 0.2s;
}
.serendipity-node:hover {
  border-color: rgba(139,92,246,0.4);
}
.serendipity-node-label {
  font-size: 12px; font-weight: 500; color: var(--text);
  margin-bottom: 3px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.serendipity-node-preview {
  font-size: 10px; color: var(--text-dim);
  line-height: 1.4; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.serendipity-actions {
  display: flex; gap: 8px;
}
.serendipity-btn {
  font-family: var(--mono); font-size: 10px;
  padding: 4px 12px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.serendipity-btn:hover { border-color: #a78bfa; color: #a78bfa; }
.serendipity-btn.link-btn { border-color: rgba(139,92,246,0.4); color: #a78bfa; }
.serendipity-btn.link-btn:hover { background: rgba(139,92,246,0.15); }
.serendipity-nodes { flex-direction: column; }
@media (max-width: 480px) {
  .rediscovery-card { flex: 0 0 140px; padding: 8px; }
}

/* ─── Focus View ──────────────────────── */
#view-focus { position: relative; }
.focus-nav {
  position: sticky; top: 0; z-index: 10;
  padding: 60px 16px 12px;
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(180deg, var(--bg) 70%, transparent 100%);
}
.focus-nav-btn {
  font-family: var(--mono); font-size: 11px;
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.focus-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.focus-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.focus-breadcrumb {
  font-size: 12px; color: var(--text-dim);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.focus-2hop-toggle {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  cursor: pointer;
}
.focus-2hop-toggle input { accent-color: var(--accent); }
.focus-layout {
  position: relative;
  width: 100%; min-height: calc(100vh - 80px);
  display: flex; align-items: center; justify-content: center;
}
#focus-lines {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 1;
}
#focus-center {
  position: relative; z-index: 5;
  max-width: 400px; width: calc(100% - 40px);
  max-height: 60vh; overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  box-shadow: var(--shadow);
}
.focus-center-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 4px;
  display: inline-block; margin-bottom: 10px;
}
.focus-center-label {
  font-size: 20px; font-weight: 600; margin-bottom: 8px;
  line-height: 1.3; color: var(--text);
  outline: none;
}
.focus-center-label[contenteditable="true"] {
  border-bottom: 1px dashed var(--accent);
  padding-bottom: 2px;
}
.focus-center-img {
  width: 100%; border-radius: 8px; margin-bottom: 10px;
  border: 1px solid var(--border);
}
.focus-center-url {
  font-family: var(--mono); font-size: 12px; color: var(--url);
  word-break: break-all; margin-bottom: 8px;
  display: block; text-decoration: none;
}
.focus-center-url:hover { text-decoration: underline; }
.focus-center-content {
  font-size: 13px; line-height: 1.7; color: var(--text-dim);
  white-space: pre-wrap; word-break: break-word;
  margin-bottom: 12px;
}
.focus-center-meta {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;
}
.focus-actions {
  display: flex; gap: 6px; flex-wrap: wrap;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.focus-neighbor {
  position: absolute;
  width: 90px; text-align: center;
  cursor: pointer;
  z-index: 3;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.focus-neighbor:hover { transform: scale(1.08); }
.focus-neighbor-ring {
  width: 52px; height: 52px; border-radius: 50%;
  margin: 0 auto 4px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  transition: border-color 0.2s;
}
.focus-neighbor:hover .focus-neighbor-ring { border-color: var(--accent); }
.focus-neighbor-ring img {
  width: 100%; height: 100%; object-fit: cover;
}
.focus-neighbor-icon {
  width: 10px; height: 10px; border-radius: 50%;
}
.focus-neighbor-label {
  font-size: 10px; color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  line-height: 1.3;
}
.focus-neighbor-edge {
  font-family: var(--mono); font-size: 9px; color: var(--text-muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.focus-neighbor.hop2 { opacity: 0.5; }
.focus-neighbor.hop2 .focus-neighbor-ring {
  width: 40px; height: 40px;
  border-style: dashed;
}
.focus-edge-1hop { stroke: var(--accent); stroke-opacity: 0.25; stroke-width: 1.5; }
.focus-edge-2hop { stroke: var(--text-muted); stroke-opacity: 0.15; stroke-width: 1; stroke-dasharray: 4 4; }
@media (max-width: 480px) {
  #focus-center { max-width: 280px; padding: 16px; }
  .focus-neighbor { width: 70px; }
  .focus-neighbor-ring { width: 40px; height: 40px; }
}

/* ─── Triage Enhancements ─────────────── */
.triage-image-preview {
  width: 100%; max-height: 200px; object-fit: cover;
  border-radius: 8px; margin-bottom: 10px;
  border: 1px solid var(--border);
}
.triage-url-preview {
  font-family: var(--mono); font-size: 12px; color: var(--url);
  margin-bottom: 10px; word-break: break-all;
}
.triage-connections {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
}
.triage-conn-chip {
  font-family: var(--mono); font-size: 10px;
  padding: 3px 8px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg2); color: var(--text-dim);
  display: flex; align-items: center; gap: 4px;
}
.triage-conn-dot {
  width: 5px; height: 5px; border-radius: 50%;
}
.triage-conn-weight {
  color: var(--text-muted); font-size: 9px;
}
.process-btn.star {
  border-color: var(--warm); color: var(--warm);
}
.process-btn.star:hover {
  background: rgba(251,191,36,0.15);
}
.process-btn.edit {
  border-color: var(--cool); color: var(--cool);
}
.process-btn.edit:hover {
  background: rgba(96,165,250,0.15);
}
#triage-edit {
  display: none;
  padding: 20px;
}
#triage-edit.open { display: block; }
#triage-edit label {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.5px; display: block; margin-bottom: 4px;
}
#triage-edit input, #triage-edit textarea {
  width: 100%; border: 1px solid var(--border);
  background: var(--bg2); color: var(--text);
  font-family: var(--font); font-size: 13px;
  padding: 8px 12px; border-radius: 8px;
  margin-bottom: 12px; outline: none;
}
#triage-edit input:focus, #triage-edit textarea:focus { border-color: var(--accent); }
#triage-edit textarea { min-height: 80px; resize: vertical; }
.triage-type-pills {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px;
}
.triage-type-pill {
  font-family: var(--mono); font-size: 10px;
  padding: 3px 10px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s;
}
.triage-type-pill.active {
  background: var(--accent); color: var(--bg); border-color: var(--accent);
}
.triage-type-pill:hover { border-color: var(--accent); color: var(--accent); }
.triage-edit-actions {
  display: flex; gap: 8px; justify-content: flex-end;
}
.triage-zero {
  text-align: center; padding: 40px 20px;
}
.triage-zero-icon { font-size: 48px; margin-bottom: 16px; }
.triage-zero h2 {
  font-size: 22px; font-weight: 600; color: var(--accent);
  margin-bottom: 8px;
}
.triage-zero p { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
#triage-undo {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 18px;
  box-shadow: var(--shadow); z-index: 510;
  display: none; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text-dim);
  animation: triage-undo-in 0.3s ease;
}
#triage-undo.open { display: flex; }
#triage-undo button {
  font-family: var(--mono); font-size: 12px;
  padding: 4px 12px; border-radius: 6px;
  border: 1px solid var(--accent); background: var(--accent-dim);
  color: var(--accent); cursor: pointer; transition: all 0.2s;
}
#triage-undo button:hover { background: var(--accent); color: var(--bg); }
@keyframes triage-undo-in {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.swipe-right {
  animation: swipe-r 0.3s ease forwards;
}
.swipe-left {
  animation: swipe-l 0.3s ease forwards;
}
.swipe-up {
  animation: swipe-u 0.3s ease forwards;
}
@keyframes swipe-r {
  to { transform: translateX(120%) rotate(8deg); opacity: 0; }
}
@keyframes swipe-l {
  to { transform: translateX(-120%) rotate(-8deg); opacity: 0; }
}
@keyframes swipe-u {
  to { transform: translateY(-80%) scale(0.9); opacity: 0; }
}
.card-enter {
  animation: card-in 0.25s ease;
}
@keyframes card-in {
  from { transform: scale(0.95) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

/* ─── Canvas Selector ──────────────────── */
#canvas-selector {
  position: fixed; top: 52px; left: 0; right: 0;
  height: 40px;
  display: none; align-items: center;
  padding: 0 16px;
  gap: 6px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  z-index: 95;
  overflow-x: auto;
  scrollbar-width: none;
}
#canvas-selector::-webkit-scrollbar { display: none; }
#canvas-selector.active { display: flex; }

.canvas-tab {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 4px 12px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
}
.canvas-tab:hover { border-color: var(--accent); color: var(--text); }
.canvas-tab.active {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent); font-weight: 700;
}
.canvas-tab .canvas-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.canvas-tab .canvas-count {
  font-size: 9px; opacity: 0.7;
}

#canvas-new-btn {
  font-family: var(--mono); font-size: 11px;
  padding: 4px 10px; border-radius: 6px;
  border: 1px dashed var(--border);

}

/* Canvas modal */
#canvas-modal-overlay {

  z-index: 500;
  display: none; align-items: flex-start; justify-content: center;
  padding-top: 20vh;
}
#canvas-modal-overlay.open { display: flex; }
#canvas-modal {
  width: min(420px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 20px;
}
#canvas-modal h3 {
  font-size: 14px; font-weight: 500; margin-bottom: 16px; color: var(--text);
}
.canvas-form-row {
  margin-bottom: 12px;
}
.canvas-form-row label {
  display: block;
  font-family: var(--mono); font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.canvas-form-row input, .canvas-form-row textarea {
  width: 100%; border: 1px solid var(--border); outline: none;
  background: var(--bg2); color: var(--text);
  font-family: var(--font); font-size: 13px;
  padding: 8px 12px; border-radius: 8px;
}
.canvas-form-row input:focus, .canvas-form-row textarea:focus { border-color: var(--accent); }
.canvas-form-row textarea { resize: vertical; min-height: 50px; max-height: 120px; }
.canvas-color-row {
  display: flex; gap: 6px; margin-bottom: 12px;
}
.canvas-color-swatch {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer; transition: all 0.15s;
}
.canvas-color-swatch:hover { transform: scale(1.15); }
.canvas-color-swatch.selected { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
.canvas-modal-actions {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
}
.canvas-modal-btn {
  font-family: var(--font); font-size: 13px;
  padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.canvas-modal-btn:hover { border-color: var(--accent); color: var(--accent); }
.canvas-modal-btn.primary {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent); font-weight: 500;
}
.canvas-modal-btn.primary:hover { background: var(--accent2); }
.canvas-modal-btn.danger { border-color: #ef4444; color: #ef4444; }
.canvas-modal-btn.danger:hover { background: rgba(239,68,68,0.15); }

/* Canvas add-to-canvas dropdown in focus view */
.canvas-add-dropdown {
  position: fixed; z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px; min-width: 180px;
  box-shadow: var(--shadow);
}
.canvas-add-option {
  padding: 6px 12px;
  font-family: var(--mono); font-size: 11px;
  cursor: pointer; border-radius: 4px;
  transition: background 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.canvas-add-option:hover { background: var(--surface); }
.canvas-add-option .canvas-dot { width: 6px; height: 6px; border-radius: 50%; }
</style>

<body>

<div class="loading-bar" id="loading-bar"></div>

<canvas id="graph-canvas"></canvas>
<!-- <div id="three-container" style="position:absolute;inset:0;display:none;"></div> -->

<!-- View Layers (DOM-based views) -->

<!-- Top Bar -->

<script>
// ═══════════════════════════════════════════════════════
// Open Mind — Force-Directed Graph Frontend
// ═══════════════════════════════════════════════════════

const API = window.location.origin;
const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');

// ─── State ────────────────────────────────
let nodes = [];
let edges = [];
let nodeMap = {};  // id -> node
let clusters = [];  // cluster data from server
let collapsedClusters = new Set();  // collapsed cluster IDs

// Camera
let cam = { x: 0, y: 0, zoom: 1 };
let targetCam = { x: 0, y: 0, zoom: 1 };

// Interaction
let dragNode = null;
let hoveredNode = null;
let selectedNode = null;
let isPanning = false;
let panStart = { x: 0, y: 0 };
let lastMouse = { x: 0, y: 0 };

// Physics
let simRunning = true;
let simAlpha = 1.0;
const SIM_DECAY = 0.998;
const REPULSION = 800;
const ATTRACTION = 0.005;
const EDGE_LENGTH = 120;
const DAMPING = 0.85;
const CENTER_GRAVITY = 0.0005;

// Node sizing
const NODE_BASE_RADIUS = 18;
const NODE_MIN_RADIUS = 10;
const NODE_MAX_RADIUS = 30;

// Colors by type
const TYPE_COLORS = {
  idea: '#a78bfa', url: '#38bdf8', paper: '#fb923c',
  project: '#4ade80', task: '#f472b6', image: '#e879f9',
  note: '#6ee7b7', daily: '#94a3b8', appointment: '#fbbf24'
};

const EDGE_TYPE_COLORS = {
  supports: '#4ade80',
  contradicts: '#f87171',
  extends: '#60a5fa',
  'is-part-of': '#a78bfa',
  'inspired-by': '#fbbf24',
  'similar-to': '#94a3b8',
  implements: '#2dd4bf',
  questions: '#fb923c',
  summarizes: '#e879f9',
  'example-of': '#38bdf8',
  discusses: '#818cf8',
  inspired_by: '#fbbf24',
  relates_to: '#94a3b8',
  depends_on: '#fb923c',
  alternative_to: '#f87171',
  related: '#4a4a62'
};
function edgeColor(type) { return EDGE_TYPE_COLORS[type] || EDGE_TYPE_COLORS.related; }

const TYPE_SCHEMAS = {
  paper: {
    authors: {type:'text', label:'Authors'},
    journal: {type:'text', label:'Journal/Source'},
    year: {type:'number', label:'Year'},
    doi: {type:'url', label:'DOI'},
    read_status: {type:'select', label:'Status', options:['to-read','reading','read','cited']},
    rating: {type:'number', label:'Rating (1-5)'},
  },
  task: {
    priority: {type:'select', label:'Priority', options:['low','medium','high','urgent']},
    task_due: {type:'date', label:'Due Date'},
    task_status: {type:'select', label:'Status', options:['todo','in-progress','blocked','done']},
    assigned_to: {type:'text', label:'Assigned To'},
  },
  person: {
    company: {type:'text', label:'Company'},
    role: {type:'text', label:'Role'},
    email: {type:'email', label:'Email'},
    phone: {type:'text', label:'Phone'},
    relationship: {type:'select', label:'Relationship', options:['friend','colleague','contact','mentor','family']},
  },
  project: {
    project_status: {type:'select', label:'Status', options:['ideation','active','paused','completed','abandoned']},
    start_date: {type:'date', label:'Start Date'},
    target_date: {type:'date', label:'Target Date'},
    stakeholders: {type:'text', label:'Stakeholders'},
  },
  url: {
    site_name: {type:'text', label:'Site'},
    author: {type:'text', label:'Author'},
    published_date: {type:'date', label:'Published'},
    read_status: {type:'select', label:'Status', options:['unread','reading','read','archived']},
  },
  appointment: {
    appt_date: {type:'datetime', label:'Date & Time'},
    location: {type:'text', label:'Location'},
    attendees: {type:'text', label:'Attendees'},
    recurring: {type:'select', label:'Recurring', options:['none','daily','weekly','monthly']},
  },
  image: {
    source: {type:'text', label:'Source'},
    subjects: {type:'text', label:'Subjects'},
    img_location: {type:'text', label:'Location'},
  },
  idea: {
    idea_status: {type:'select', label:'Status', options:['raw','developing','validated','implemented','abandoned']},
    domain: {type:'text', label:'Domain'},
  },
  note: {},
  daily: {},
};

function renderStructuredFields(data) {
  const schema = TYPE_SCHEMAS[data.type];
  if (!schema || Object.keys(schema).length === 0) return '';
  const meta = data.meta || {};
  const rows = Object.entries(schema).map(([key, fieldDef]) => {
    const val = meta[key] !== undefined && meta[key] !== null ? meta[key] : '';
    const safeVal = escapeHtml(String(val));
    let input;
    if (fieldDef.type === 'select') {
      const opts = (fieldDef.options || []).map(o =>
        `<option value="${escapeHtml(o)}"${String(val) === o ? ' selected' : ''}>${escapeHtml(o)}</option>`
      ).join('');
      input = `<select class="struct-field-input" data-field="${key}" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px;font-family:var(--mono);width:100%"><option value="">—</option>${opts}</select>`;
    } else if (fieldDef.type === 'date') {
      input = `<input type="date" class="struct-field-input" data-field="${key}" value="${safeVal}" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px;font-family:var(--mono);width:100%" />`;
    } else if (fieldDef.type === 'datetime') {
      input = `<input type="datetime-local" class="struct-field-input" data-field="${key}" value="${safeVal}" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px;font-family:var(--mono);width:100%" />`;
    } else if (fieldDef.type === 'number') {
      input = `<input type="number" class="struct-field-input" data-field="${key}" value="${safeVal}" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px;font-family:var(--mono);width:100%" />`;
    } else if (fieldDef.type === 'url') {
      input = `<input type="url" class="struct-field-input" data-field="${key}" value="${safeVal}" placeholder="https://..." style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px;font-family:var(--mono);width:100%" />`;
    } else if (fieldDef.type === 'email') {
      input = `<input type="email" class="struct-field-input" data-field="${key}" value="${safeVal}" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px;font-family:var(--mono);width:100%" />`;
    } else {
      input = `<input type="text" class="struct-field-input" data-field="${key}" value="${safeVal}" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:12px;font-family:var(--mono);width:100%" />`;
    }
    return `<div style="display:grid;grid-template-columns:90px 1fr;gap:4px;align-items:center"><label style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">${escapeHtml(fieldDef.label)}</label>${input}</div>`;
  });
  return `<div class="struct-fields" style="margin:10px 0;padding:8px;background:var(--surface);border-radius:6px;border:1px solid var(--border);display:flex;flex-direction:column;gap:4px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:2px">Fields</div>
    ${rows.join('')}
    <button class="struct-save-btn" style="margin-top:4px;padding:3px 10px;font-size:11px;background:var(--accent);color:#000;border:none;border-radius:4px;cursor:pointer;font-family:var(--mono);align-self:flex-end">Save Fields</button>
  </div>`;
}

// ─── View State ──────────────────────────
const CANVAS_VIEWS = ['map', 'semantic'];
let currentView = localStorage.getItem('om-view') || 'stream';
let previousView = 'stream';
let layoutMode = CANVAS_VIEWS.includes(currentView) ? currentView : 'semantic';

// Stream state
let streamFilter = 'all';

// ─── View Utilities ───────────────────────
function relativeTime(isoString) {
  if (!isoString) return '';
  const d = new Date(isoString);
  const now = Date.now();
  const diff = now - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function getEdgeCount(nodeId) {
  return edges.filter(e => e.source === nodeId || e.target === nodeId).length;
}

// ─── View Switcher ────────────────────────
function switchView(viewName) {
  // Don't switch to focus if no node selected
  if (viewName === 'focus' && !focusState.active) return;

  const prevView = currentView;
  previousView = prevView;
  currentView = viewName;
  localStorage.setItem('om-view', viewName);

  // Hide all view layers
  document.querySelectorAll('.view-layer').forEach(el => el.classList.remove('active'));

  // Update tab active states
  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.view === viewName);
  });

  // Canvas selector visibility (show only in Map view)
  const canvasSel = document.getElementById('canvas-selector');
  if (canvasSel) canvasSel.classList.toggle('active', viewName === 'map');

  // Canvas visibility
  const isCanvas = CANVAS_VIEWS.includes(viewName);
  canvas.style.display = isCanvas ? 'block' : 'none';

  if (isCanvas) {
    layoutMode = viewName;
    if (viewName === 'map') {
      // Save semantic positions if coming from semantic
      if (prevView === 'semantic') {
        const positions = nodes.map(n => ({
          id: n.id, x: Math.round(n.x * 100) / 100, y: Math.round(n.y * 100) / 100
        }));
        if (positions.length) {
          api('/api/positions', { method: 'POST', body: JSON.stringify(positions) });
        }
      }
      // When switching to Map, clear activeCanvas and reload default map
      // (user can then select a canvas from the selector)
      if (prevView !== 'map') {
        activeCanvas = null;
        canvasNodeIds.clear();
      }
      // Reload to restore saved map positions (or canvas graph if active)
      if (activeCanvas) {
        loadCanvasGraph(activeCanvas.id);
      } else {
        loadGraph();
      }
    } else if (viewName === 'semantic') {
      // Save map positions if coming from map
      if (prevView === 'map') {
        _flushCanvasOrMapPositions();
      }
      // Leave canvas mode when switching to semantic
      if (activeCanvas) {
        activeCanvas = null;
        canvasNodeIds.clear();
        loadGraph();
      }
      // Kick simulation
      for (const n of nodes) {
        n._pinned = false;
        n.vx = (Math.random() - 0.5) * 2;
        n.vy = (Math.random() - 0.5) * 2;
      }
      simRunning = true;
      simAlpha = 1.0;
    }
  } else {
    // DOM-based view
    const viewEl = document.getElementById(`view-${viewName}`);
    if (viewEl) viewEl.classList.add('active');

    if (viewName === 'stream') {
      renderStream();
    } else if (viewName === 'focus') {
      renderFocusView();
    } else if (viewName === 'triage') {
      startTriage();
    }
  }
}

function _flushCanvasOrMapPositions() {
  const positions = nodes.filter(n => n._pinned).map(n => ({
    id: n.id, x: Math.round(n.x * 100) / 100, y: Math.round(n.y * 100) / 100
  }));
  if (!positions.length) return;
  if (activeCanvas) {
    api(`/api/canvases/${activeCanvas.id}/positions`, { method: 'POST', body: JSON.stringify(positions) });
  } else {
    api('/api/positions', { method: 'POST', body: JSON.stringify(positions) });
  }
}
