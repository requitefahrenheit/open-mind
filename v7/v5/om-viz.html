// ─── Utilities ────────────────────────────
function toast(msg, type = 'success') {
  if (type !== 'error') return;  // Only show errors
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function setLoading(on) {
  document.getElementById('loading-bar').classList.toggle('active', on);
}

async function api(path, opts = {}) {
  const url = `${API}${path}`;
  try {
    const headers = opts.headers || {};
    // Only set Content-Type for JSON if body is a string (not FormData)
    if (opts.body && typeof opts.body === 'string' && !headers['Content-Type']) {
      headers['Content-Type'] = 'application/json';
    }
    const r = await fetch(url, { ...opts, headers });
    return await r.json();
  } catch (e) {
    console.error('API error:', e);
    toast('Connection error', 'error');
    return null;
  }
}

// ─── Note Prompt ──────────────────────────
function promptForNote(title, preview) {
  return new Promise(resolve => {
    const overlay = document.getElementById('note-modal-overlay');
    const input = document.getElementById('note-modal-input');
    const titleEl = document.getElementById('note-modal-title');
    const previewEl = document.getElementById('note-modal-preview');
    const skipBtn = document.getElementById('note-modal-skip');
    const submitBtn = document.getElementById('note-modal-submit');

    titleEl.textContent = title || 'Add a note';
    previewEl.textContent = preview || '';
    input.value = '';
    overlay.classList.add('open');
    setTimeout(() => input.focus(), 50);

    function cleanup() {
      overlay.classList.remove('open');
      skipBtn.removeEventListener('click', onSkip);
      submitBtn.removeEventListener('click', onSubmit);
      input.removeEventListener('keydown', onKey);
      overlay.removeEventListener('click', onBg);
    }
    function onSkip() { cleanup(); resolve(''); }
    function onSubmit() { cleanup(); resolve(input.value.trim()); }
    function onKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSubmit(); }
      if (e.key === 'Escape') { onSkip(); }
    }
    function onBg(e) { if (e.target === overlay) onSkip(); }

    skipBtn.addEventListener('click', onSkip);
    submitBtn.addEventListener('click', onSubmit);
    input.addEventListener('keydown', onKey);
    overlay.addEventListener('click', onBg);
  });
}

// ─── Processing Toast (non-blocking indicator) ──
function processingToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast processing';
  el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  return {
    update(newMsg) { el.querySelector('span').textContent = newMsg; },
    done(finalMsg, type = 'success') {
      el.remove();
      if (finalMsg) toast(finalMsg, type);
    }
  };
}

// Helper: detect if text looks like a URL
function looksLikeUrl(text) {
  return /^https?:\/\/\S+$/i.test(text.trim()) || /^www\.\S+$/i.test(text.trim());
}

// ─── Graph Data ───────────────────────────
async function loadGraph() {
  // Flush any pending position saves before reloading
  if (_positionsDirty) {
    clearTimeout(positionSaveTimeout);
    const positions = _getPositionData();
    if (positions.length) {
      const url = activeCanvas
        ? `/api/canvases/${activeCanvas.id}/positions`
        : '/api/positions';
      await api(url, { method: 'POST', body: JSON.stringify(positions) });
    }
    _positionsDirty = false;
  }
  setLoading(true);
  const data = await api('/api/graph');
  setLoading(false);
  if (!data) return;

  const oldNodeMap = nodeMap;  // Preserve positions from previous state
  nodeMap = {};
  nodes = data.nodes.map(n => {
    const existing = oldNodeMap[n.id];
    const node = {
      ...n,
      x: n.x ?? (existing?.x) ?? (Math.random() - 0.5) * 400,
      y: n.y ?? (existing?.y) ?? (Math.random() - 0.5) * 400,
      z: existing?.z ?? (Math.random() - 0.5) * 200,
      vx: existing?.vx || 0,
      vy: existing?.vy || 0,
      vz: existing?.vz || 0,
      radius: calcRadius(n),
      color: TYPE_COLORS[n.type] || TYPE_COLORS.note,
      _pinned: n.pinned || (existing?._pinned ?? false)  // preserve drag-pin state
    };
    preloadThumb(node);
    nodeMap[n.id] = node;
    return node;
  });

  edges = data.edges.map(e => ({
    ...e,
    sourceNode: nodeMap[e.source],
    targetNode: nodeMap[e.target]
  })).filter(e => e.sourceNode && e.targetNode);

  // Store cluster data from server
  clusters = data.clusters || [];

  // Update stats
  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-edges').textContent = edges.length;
  const inbox = nodes.filter(n => n.status === 'inbox').length;
  const inboxCountEl = document.getElementById('inbox-count');
  const inboxBadge = document.getElementById('inbox-badge');
  if (inboxCountEl) {
    inboxCountEl.textContent = inbox;
    inboxCountEl.style.display = inbox > 0 ? 'inline' : 'none';
  }
  if (inboxBadge) inboxBadge.classList.toggle('has-items', inbox > 0);

  // Re-render active DOM view after graph reload
  if (currentView === 'stream' && typeof renderStream === 'function') renderStream();

  // Apply layout mode
  if (layoutMode === 'map') {
    // Map mode: pin all nodes, no simulation
    for (const n of nodes) n._pinned = true;
    simAlpha = 0;
  } else {
    // Semantic mode: only kick simulation for new/unpositioned nodes
    const hasNew = nodes.some(n => n.x === 0 && n.y === 0 && !n.pinned);
    simAlpha = hasNew ? 0.5 : Math.max(simAlpha, 0.05);
  }
}

// Thumbnail image cache — keyed by URL, persists across graph reloads
const _thumbCache = new Map();

function getThumbUrl(n) {
  // Image nodes: use uploaded image
  if (n.image) return `/uploads/${n.image}`;
  // URL nodes: use locally-saved thumbnail, fallback to external og:image
  if (n.meta?.thumbnail) return `/uploads/${n.meta.thumbnail}`;
  if (n.meta?.image) return n.meta.image;
  return null;
}

function preloadThumb(node) {
  const url = getThumbUrl(node);
  if (!url) { node._thumb = null; return; }
  if (_thumbCache.has(url)) { node._thumb = _thumbCache.get(url); return; }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = url;
  _thumbCache.set(url, img);
  node._thumb = img;
}

function calcRadius(n) {
  let r = NODE_BASE_RADIUS;
  // Temperature boost
  r *= 0.7 + (n.temperature || 1) * 0.4;
  // Starred boost
  if (n.starred) r *= 1.15;
  // Daily nodes smaller
  if (n.type === 'daily') r *= 0.7;
  // Thumbnail nodes slightly larger
  if (getThumbUrl(n)) r *= 1.3;
  return Math.max(NODE_MIN_RADIUS, Math.min(NODE_MAX_RADIUS * 1.3, r));
}

// ─── Physics Simulation ──────────────────
function simulate() {
  if (!CANVAS_VIEWS.includes(currentView)) return;
  if (!simRunning || simAlpha < 0.001 || layoutMode === 'map') return;
  simAlpha *= SIM_DECAY;

  const alpha = simAlpha;

  const use3D = typeof is3D !== 'undefined' && is3D;

  // Repulsion (all pairs)
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dz = use3D ? (b.z - a.z) : 0;
      let dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
      let force = (REPULSION * alpha) / (dist * dist);
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      let fz = use3D ? (dz / dist) * force : 0;
      if (!a._pinned) { a.vx -= fx; a.vy -= fy; if (use3D) a.vz -= fz; }
      if (!b._pinned) { b.vx += fx; b.vy += fy; if (use3D) b.vz += fz; }
    }
  }

  // Edge attraction
  for (const e of edges) {
    const a = e.sourceNode, b = e.targetNode;
    if (!a || !b) continue;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dz = use3D ? (b.z - a.z) : 0;
    let dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
    let force = (dist - EDGE_LENGTH) * ATTRACTION * alpha * (e.weight || 1);
    let fx = (dx / dist) * force;
    let fy = (dy / dist) * force;
    let fz = use3D ? (dz / dist) * force : 0;
    if (!a._pinned) { a.vx += fx; a.vy += fy; if (use3D) a.vz += fz; }
    if (!b._pinned) { b.vx -= fx; b.vy -= fy; if (use3D) b.vz -= fz; }
  }

  // Center gravity (stronger for hot nodes)
  for (const n of nodes) {
    if (n._pinned) continue;
    const grav = CENTER_GRAVITY * alpha * (n.temperature || 1);
    n.vx -= n.x * grav;
    n.vy -= n.y * grav;
    if (use3D) n.vz -= n.z * grav;
  }

  // Apply velocities
  for (const n of nodes) {
    if (n._pinned) continue;
    n.vx *= DAMPING;
    n.vy *= DAMPING;
    n.x += n.vx;
    n.y += n.vy;
    if (use3D) {
      n.vz *= DAMPING;
      n.z += n.vz;
    }
  }
}

// ─── Rendering ────────────────────────────
function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  // 3D disabled — resize handler commented out
  // if (typeof threeRenderer !== 'undefined' && threeRenderer) {
  //   threeRenderer.setSize(window.innerWidth, window.innerHeight);
  //   threeCamera.aspect = window.innerWidth / window.innerHeight;
  //   threeCamera.updateProjectionMatrix();
  // }
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - cam.x) * cam.zoom + window.innerWidth / 2,
    y: (wy - cam.y) * cam.zoom + window.innerHeight / 2
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - window.innerWidth / 2) / cam.zoom + cam.x,
    y: (sy - window.innerHeight / 2) / cam.zoom + cam.y
  };
}

function draw() {
  if (!CANVAS_VIEWS.includes(currentView)) return;
  // Smooth camera
  cam.x += (targetCam.x - cam.x) * 0.1;
  cam.y += (targetCam.y - cam.y) * 0.1;
  cam.zoom += (targetCam.zoom - cam.zoom) * 0.1;

  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  // Background grid
  drawGrid();

  // Draw cluster boundaries
  const clusterColors = ['#a78bfa', '#38bdf8', '#4ade80', '#fbbf24', '#f472b6', '#fb923c', '#e879f9', '#6ee7b7'];
  for (let ci = 0; ci < clusters.length; ci++) {
    const cluster = clusters[ci];
    const memberNodes = cluster.members.map(id => nodeMap[id]).filter(Boolean);
    if (memberNodes.length < 3) continue;

    // If collapsed, skip drawing boundary (the representative node handles it)
    if (collapsedClusters.has(cluster.id)) continue;

    // Compute centroid
    let cx = 0, cy = 0;
    for (const mn of memberNodes) { cx += mn.x; cy += mn.y; }
    cx /= memberNodes.length;
    cy /= memberNodes.length;

    // Compute bounding radius
    let maxDist = 0;
    for (const mn of memberNodes) {
      const dx = mn.x - cx, dy = mn.y - cy;
      const d = Math.sqrt(dx * dx + dy * dy) + mn.radius;
      if (d > maxDist) maxDist = d;
    }

    const sc = worldToScreen(cx, cy);
    const sr = (maxDist + 30) * cam.zoom;  // padding

    // Draw translucent boundary circle
    const cColor = clusterColors[ci % clusterColors.length];
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, sr, 0, Math.PI * 2);
    ctx.fillStyle = cColor + '08';  // very translucent fill
    ctx.fill();
    ctx.strokeStyle = cColor + '25';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Cluster size label
    if (cam.zoom > 0.3) {
      ctx.font = `500 ${Math.max(9, 11 * cam.zoom)}px 'DM Sans', sans-serif`;
      ctx.fillStyle = cColor + '60';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${cluster.size} nodes`, sc.x, sc.y - sr - 8 * cam.zoom);
    }
  }

  // Determine which nodes are hidden due to collapsed clusters
  const hiddenNodes = new Set();
  const clusterRepresentatives = {};  // cluster.id -> representative node
  for (const cluster of clusters) {
    if (!collapsedClusters.has(cluster.id)) continue;
    const memberNodes = cluster.members.map(id => nodeMap[id]).filter(Boolean);
    if (memberNodes.length === 0) continue;
    // Pick the node with highest temperature as representative
    let rep = memberNodes[0];
    for (const mn of memberNodes) {
      if ((mn.temperature || 0) > (rep.temperature || 0)) rep = mn;
    }
    clusterRepresentatives[cluster.id] = rep;
    for (const mn of memberNodes) {
      if (mn.id !== rep.id) hiddenNodes.add(mn.id);
    }
  }

  // Draw edges
  for (const e of edges) {
    // Skip edges where both nodes are hidden
    if (hiddenNodes.has(e.source) && hiddenNodes.has(e.target)) continue;
    // Skip edges where one end is hidden (the collapsed cluster hides internal edges)
    if (hiddenNodes.has(e.source) || hiddenNodes.has(e.target)) continue;

    const a = worldToScreen(e.sourceNode.x, e.sourceNode.y);
    const b = worldToScreen(e.targetNode.x, e.targetNode.y);

    const isHighlighted = selectedNode &&
      (e.source === selectedNode.id || e.target === selectedNode.id);

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    const relType = e.relationship_type || 'related';
    const relColor = edgeColor(relType);
    if (isHighlighted) {
      ctx.strokeStyle = relColor + Math.round(0.5 * 255).toString(16).padStart(2, '0');
      ctx.lineWidth = 2;
    } else {
      ctx.strokeStyle = relColor + Math.round(0.15 * 255).toString(16).padStart(2, '0');
      ctx.lineWidth = 0.8;
    }
    ctx.stroke();

    // Edge label rendering
    if (cam.zoom > 0.6) {
      const relDesc = e.relationship_description;
      const displayLabel = relDesc || (relType !== 'related' ? relType.replace(/[-_]/g, ' ') : (e.label && e.label !== 'related' && e.label !== 'daily' ? e.label.replace(/_/g, ' ') : null));
      if (displayLabel) {
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        ctx.font = `400 ${Math.max(8, 9 * cam.zoom)}px 'DM Sans', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = isHighlighted ? (edgeColor(relType) + 'bb') : (edgeColor(relType) + '66');
        ctx.fillText(displayLabel, mx, my - 4 * cam.zoom);
      }
    }
  }

  // Draw nodes
  const now = Date.now();
  for (const n of nodes) {
    // Skip nodes hidden by collapsed clusters
    if (hiddenNodes.has(n.id)) continue;
    const s = worldToScreen(n.x, n.y);
    const r = n.radius * cam.zoom;

    // Skip if offscreen
    if (s.x < -50 || s.x > window.innerWidth + 50 ||
        s.y < -50 || s.y > window.innerHeight + 50) continue;

    const isSelected = selectedNode && selectedNode.id === n.id;
    const isHovered = hoveredNode && hoveredNode.id === n.id;
    const isInbox = n.status === 'inbox';
    const temp = n.temperature || 1;

    // Glow for hot nodes
    if (temp > 1.2 || isSelected || isHovered) {
      const glowR = r * (isSelected ? 2.5 : isHovered ? 2 : 1.5);
      const grd = ctx.createRadialGradient(s.x, s.y, r * 0.5, s.x, s.y, glowR);
      grd.addColorStop(0, n.color + '30');
      grd.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Inbox pulse ring
    if (isInbox) {
      const pulsePhase = (Math.sin(now * 0.003 + n.x) + 1) * 0.5;
      const pulseR = r * (1.3 + pulsePhase * 0.5);
      ctx.beginPath();
      ctx.arc(s.x, s.y, pulseR, 0, Math.PI * 2);
      ctx.strokeStyle = n.color + Math.floor(30 + pulsePhase * 40).toString(16);
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Node body
    const hasThumb = n._thumb && n._thumb.complete && n._thumb.naturalWidth > 0;
    ctx.beginPath();
    if (hasThumb || n.type === 'image') {
      // Rounded square for visual nodes
      roundRect(ctx, s.x - r, s.y - r, r * 2, r * 2, r * 0.3);
    } else {
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    }

    if (hasThumb) {
      // Draw thumbnail image clipped to shape
      ctx.save();
      ctx.clip();
      // Cover-fit: center-crop the image to fill the node
      const iw = n._thumb.naturalWidth, ih = n._thumb.naturalHeight;
      const scale = Math.max((r * 2) / iw, (r * 2) / ih);
      const dw = iw * scale, dh = ih * scale;
      ctx.drawImage(n._thumb, s.x - dw / 2, s.y - dh / 2, dw, dh);
      // Dim overlay based on temperature (colder = darker)
      const dimAlpha = Math.max(0, 0.4 - temp * 0.25);
      if (dimAlpha > 0.02) {
        ctx.fillStyle = `rgba(10,10,15,${dimAlpha})`;
        ctx.fill();
      }
      ctx.restore();
      // Redraw path for border stroke
      ctx.beginPath();
      roundRect(ctx, s.x - r, s.y - r, r * 2, r * 2, r * 0.3);
    } else {
      // Fill with temperature gradient
      const alpha = 0.15 + temp * 0.15;
      ctx.fillStyle = n.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.fill();
    }

    // Border
    ctx.strokeStyle = isSelected ? '#fff' : isHovered ? n.color : n.color + '60';
    ctx.lineWidth = isSelected ? 2 : isHovered ? 1.5 : 0.8;
    ctx.stroke();

    // Star indicator
    if (n.starred) {
      ctx.font = `${Math.max(8, r * 0.6)}px sans-serif`;
      ctx.fillStyle = '#fbbf24';
      ctx.textAlign = 'center';
      ctx.fillText('★', s.x + r * 0.7, s.y - r * 0.5);
    }

    // Cluster collapse badge (shown on representative node of collapsed cluster)
    for (const cid of collapsedClusters) {
      const rep = clusterRepresentatives[cid];
      if (rep && rep.id === n.id) {
        const cluster = clusters.find(c => c.id === cid);
        if (cluster) {
          const badgeR = Math.max(7, r * 0.4);
          const bx = s.x - r * 0.7, by = s.y - r * 0.7;
          ctx.beginPath();
          ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
          ctx.fillStyle = '#6ee7b7';
          ctx.fill();
          ctx.font = `700 ${Math.max(7, badgeR * 1.1)}px 'DM Sans', sans-serif`;
          ctx.fillStyle = '#0a0a0f';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(cluster.size), bx, by);
        }
        break;
      }
    }

    // Label
    if (cam.zoom > 0.35 && n.label) {
      const fontSize = Math.max(9, Math.min(13, r * 0.65));
      ctx.font = `500 ${fontSize}px 'DM Sans', sans-serif`;
      ctx.fillStyle = isSelected || isHovered ? '#fff' : `rgba(224,223,232,${0.5 + temp * 0.3})`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Truncate label
      let label = n.label || '';
      if (label.length > 24) label = label.slice(0, 22) + '…';
      ctx.fillText(label, s.x, s.y + r + fontSize + 2);
    }

    // Type icon (small dot)
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = n.color;
    ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawGrid() {
  const step = 60 * cam.zoom;
  if (step < 10) return;

  const ox = (window.innerWidth / 2 - cam.x * cam.zoom) % step;
  const oy = (window.innerHeight / 2 - cam.y * cam.zoom) % step;

  ctx.strokeStyle = 'rgba(40, 40, 60, 0.3)';
  ctx.lineWidth = 0.5;

  for (let x = ox; x < window.innerWidth; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, window.innerHeight); ctx.stroke();
  }
  for (let y = oy; y < window.innerHeight; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(window.innerWidth, y); ctx.stroke();
  }
}

// ─── Hit Testing ──────────────────────────
function hitTest(sx, sy) {
  const w = screenToWorld(sx, sy);
  const padding = 5 / cam.zoom;  // 5 screen pixels of extra hit area
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = w.x - n.x, dy = w.y - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < n.radius + padding) return n;
  }
  return null;
}

// ─── Input Handling ───────────────────────
let didDrag = false;  // Track whether a drag occurred (prevent click after drag)

canvas.addEventListener('mousedown', e => {
  didDrag = false;
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    dragNode = hit;
    dragNode._pinned = true;
    canvas.classList.add('dragging');
  } else {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    canvas.classList.add('dragging');
  }
});

canvas.addEventListener('mousemove', e => {
  lastMouse = { x: e.clientX, y: e.clientY };

  if (dragNode) {
    didDrag = true;
    const w = screenToWorld(e.clientX, e.clientY);
    dragNode.x = w.x;
    dragNode.y = w.y;
    if (layoutMode === 'semantic') simAlpha = Math.max(simAlpha, 0.1);
    return;
  }

  if (isPanning) {
    didDrag = true;
    const dx = e.clientX - panStart.x;
    const dy = e.clientY - panStart.y;
    targetCam.x -= dx / cam.zoom;
    targetCam.y -= dy / cam.zoom;
    panStart = { x: e.clientX, y: e.clientY };
    return;
  }

  const hit = hitTest(e.clientX, e.clientY);
  if (hit !== hoveredNode) {
    hoveredNode = hit;
    canvas.classList.toggle('node-hover', !!hit);
  }
});

canvas.addEventListener('mouseup', e => {
  if (dragNode) {
    saveNodePosition();
    dragNode = null;
  }
  if (!didDrag) {
    // Only open detail on clean click (no drag/pan)
    const hit = hitTest(e.clientX, e.clientY);
    if (hit) enterFocusView(hit.id);
    else closeSearch();
  }
  isPanning = false;
  didDrag = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('dblclick', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    // Focus camera on node
    targetCam.x = hit.x;
    targetCam.y = hit.y;
    targetCam.zoom = 1.5;
  } else {
    // Check if double-click is near a cluster boundary — toggle collapse
    const w = screenToWorld(e.clientX, e.clientY);
    for (const cluster of clusters) {
      const memberNodes = cluster.members.map(id => nodeMap[id]).filter(Boolean);
      if (memberNodes.length < 3) continue;
      let cx = 0, cy = 0;
      for (const mn of memberNodes) { cx += mn.x; cy += mn.y; }
      cx /= memberNodes.length;
      cy /= memberNodes.length;
      let maxDist = 0;
      for (const mn of memberNodes) {
        const dx = mn.x - cx, dy = mn.y - cy;
        const d = Math.sqrt(dx * dx + dy * dy) + mn.radius;
        if (d > maxDist) maxDist = d;
      }
      const boundaryR = maxDist + 30;
      const dxc = w.x - cx, dyc = w.y - cy;
      const distToCenter = Math.sqrt(dxc * dxc + dyc * dyc);
      // Click within the boundary ring area (between 70% and 110% of radius)
      if (distToCenter < boundaryR * 1.1 && distToCenter > boundaryR * 0.7) {
        if (collapsedClusters.has(cluster.id)) {
          collapsedClusters.delete(cluster.id);
        } else {
          collapsedClusters.add(cluster.id);
        }
        simAlpha = Math.max(simAlpha, 0.3);
        break;
      }
    }
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  targetCam.zoom = Math.max(0.15, Math.min(4, targetCam.zoom * zoomFactor));

  // Zoom toward mouse
  const w = screenToWorld(e.clientX, e.clientY);
  targetCam.x += (w.x - targetCam.x) * (1 - 1 / zoomFactor) * 0.3;
  targetCam.y += (w.y - targetCam.y) * (1 - 1 / zoomFactor) * 0.3;
}, { passive: false });

// Touch support
let touches = {};
let touchDragged = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchDragged = false;
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const hit = hitTest(t.clientX, t.clientY);
    if (hit) {
      dragNode = hit;
      dragNode._pinned = true;
    } else {
      isPanning = true;
      panStart = { x: t.clientX, y: t.clientY };
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchDragged = true;
  if (e.touches.length === 1) {
    const t = e.touches[0];
    if (dragNode) {
      const w = screenToWorld(t.clientX, t.clientY);
      dragNode.x = w.x; dragNode.y = w.y;
    } else if (isPanning) {
      const dx = t.clientX - panStart.x;
      const dy = t.clientY - panStart.y;
      targetCam.x -= dx / cam.zoom;
      targetCam.y -= dy / cam.zoom;
      panStart = { x: t.clientX, y: t.clientY };
    }
  } else if (e.touches.length === 2) {
    // Pinch zoom
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (touches.pinchDist) {
      const scale = d / touches.pinchDist;
      targetCam.zoom = Math.max(0.15, Math.min(4, targetCam.zoom * scale));
    }
    touches.pinchDist = d;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (dragNode) {
    saveNodePosition();
    dragNode = null;
  }
  // Tap to select (only if no drag occurred)
  if (!touchDragged && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    const hit = hitTest(t.clientX, t.clientY);
    if (hit) enterFocusView(hit.id);
  }
  isPanning = false;
  touchDragged = false;
  touches = {};
});

// ─── Keyboard ─────────────────────────────
document.addEventListener('keydown', e => {
  // Ask mode
  if (e.key === '?' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    mainInput.placeholder = 'Ask your knowledge base\u2026';
    mainInput.dataset.askMode = 'true';
    mainInput.focus();
    return;
  }

  // Command palette
  if (e.key === '/' && document.activeElement !== document.getElementById('main-input')) {
    e.preventDefault();
    openCmdPalette();
    return;
  }

  // Escape
  if (e.key === 'Escape') {
    if (askState.active) { closeAskPanel(); return; }
    if (currentView === 'focus') { exitFocusView(); return; }
    closeDetail();
    closeCmdPalette();
    closeSearch();
    return;
  }

  // Focus input
  if (e.key === 'Tab' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('main-input').focus();
  }
});

// ─── Main Input ───────────────────────────
const mainInput = document.getElementById('main-input');

// Fire-and-forget NL request (non-blocking for adds)
function fireNLRequest(text, note) {
  // Combine note with text for URL inputs
  const payload = note ? `${text}\n\n[Note]: ${note}` : text;
  const pt = processingToast(`Processing: ${text.slice(0, 50)}${text.length > 50 ? '…' : ''}`);
  api('/api/nl', {
    method: 'POST',
    body: JSON.stringify({ text: payload, channel: 'web' })
  }).then(async data => {
    if (!data) { pt.done('Processing failed', 'error'); return; }
    if (data.action === 'add') {
      pt.done(data.response || `Added: ${data.node?.label}`);
      await loadGraph();
      if (data.node?.id && nodeMap[data.node.id]) {
        const newNode = nodeMap[data.node.id];
        targetCam.x = newNode.x;
        targetCam.y = newNode.y;
        simAlpha = 1.0;
      }
    } else if (data.action === 'digest') {
      pt.done(data.response);
    } else {
      pt.done(data.response || 'Done');
    }
  }).catch(() => pt.done('Processing failed', 'error'));
}

mainInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = mainInput.value.trim();
    if (!text) return;

    if (text === '/') {
      mainInput.value = '';
      openCmdPalette();
      return;
    }

    if (text.toLowerCase() === 'process' || text.toLowerCase() === 'process inbox') {
      mainInput.value = '';
      switchView('triage');
      return;
    }

    mainInput.value = '';

    // Ask mode: question mark at end OR ask mode flag OR "ask" prefix
    const isAsk = mainInput.dataset.askMode === 'true' ||
                  text.endsWith('?') ||
                  /^(ask|tell me|explain|how|why|what do i know)\b/i.test(text);
    if (isAsk) {
      mainInput.placeholder = 'Type anything, hit Enter\u2026';
      delete mainInput.dataset.askMode;
      openAskPanel(text);
      return;
    }

    // Search queries still block (user needs results immediately)
    const isSearch = /^(find|search|show|where|what)\b/i.test(text);
    if (isSearch) {
      setLoading(true);
      const data = await api('/api/nl', {
        method: 'POST',
        body: JSON.stringify({ text, channel: 'web' })
      });
      setLoading(false);
      if (!data) return;
      if (data.action === 'search') {
        showSearchResults(data.results, data.response);
      } else if (data.action === 'add') {
        toast(data.response || `Added: ${data.node?.label}`);
        await loadGraph();
      } else {
        toast(data.response || 'Done');
      }
      return;
    }

    // Everything else (text, URLs, commands): non-blocking through NL
    fireNLRequest(text, '');
  }

  if (e.key === 'Escape') {
    mainInput.blur();
    closeSearch();
  }
});

// Send button click
document.getElementById('send-btn').addEventListener('click', () => {
  mainInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
});

// Hint chips
document.querySelectorAll('.hint-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const hint = chip.dataset.hint;
    if (hint === '__process__') {
      switchView('triage');
      return;
    }
    if (hint === '__ask__') {
      mainInput.placeholder = 'Ask your knowledge base\u2026';
      mainInput.dataset.askMode = 'true';
      mainInput.focus();
      return;
    }
    if (hint === '/') {
      openCmdPalette();
    } else {
      mainInput.value = hint;
      mainInput.focus();
      mainInput.setSelectionRange(hint.length, hint.length);
    }
  });
});

// ─── Search Results ───────────────────────
function showSearchResults(results, responseText) {
  const overlay = document.getElementById('search-overlay');
  if (!results || results.length === 0) {
    overlay.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted)">${responseText || 'No results found'}</div>`;
    overlay.classList.add('open');
    return;
  }

  let html = responseText ? `<div style="padding:10px 14px;font-size:12px;color:var(--text-dim)">${responseText}</div>` : '';
  for (const r of results) {
    const color = TYPE_COLORS[r.node_type] || TYPE_COLORS.note;
    html += `
      <div class="search-result" data-id="${r.id}">
        <div class="conn-dot" style="background:${color}"></div>
        <div>
          <div class="search-result-label">${r.label || r.content?.slice(0, 50)}</div>
          <div class="search-result-snippet">${r.content?.slice(0, 100) || ''}</div>
        </div>
        <div class="search-result-score">${r.score ? (r.score * 100).toFixed(0) + '%' : ''}</div>
      </div>
    `;
  }
  overlay.innerHTML = html;
  overlay.classList.add('open');

  overlay.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      closeSearch();
      enterFocusView(id);
    });
  });
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
}

// ─── Ask Your Knowledge ───────────────────
function openAskPanel(question) {
  askState = { active: true, history: [], sources: [] };
  const overlay = document.getElementById('ask-overlay');
  document.getElementById('ask-messages').innerHTML = '';
  overlay.classList.add('open');
  closeSearch();

  if (question) {
    sendAskQuestion(question);
  } else {
    document.getElementById('ask-input').focus();
  }
}

function closeAskPanel() {
  askState.active = false;
  document.getElementById('ask-overlay').classList.remove('open');
}

async function sendAskQuestion(question) {
  if (!question.trim()) return;

  const messagesEl = document.getElementById('ask-messages');
  const input = document.getElementById('ask-input');
  const sendBtn = document.getElementById('ask-send');

  // Show user message
  const userMsg = document.createElement('div');
  userMsg.className = 'ask-msg user';
  userMsg.textContent = question;
  messagesEl.appendChild(userMsg);

  // Show loading
  const loadingEl = document.createElement('div');
  loadingEl.className = 'ask-loading';
  loadingEl.innerHTML = '<div class="spinner"></div>Searching your knowledge base…';
  messagesEl.appendChild(loadingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  input.value = '';
  sendBtn.disabled = true;

  // Call API
  const data = await api('/api/ask', {
    method: 'POST',
    body: JSON.stringify({
      question: question,
      history: askState.history.length ? askState.history : undefined
    })
  });

  // Remove loading
  loadingEl.remove();
  sendBtn.disabled = false;

  if (!data) {
    const errMsg = document.createElement('div');
    errMsg.className = 'ask-msg assistant';
    errMsg.textContent = 'Failed to get a response. Please try again.';
    messagesEl.appendChild(errMsg);
    return;
  }

  // Update history
  askState.history.push({ role: 'user', content: question });
  askState.history.push({ role: 'assistant', content: data.answer });
  askState.sources = data.sources || [];

  // Render assistant message
  const assistantMsg = document.createElement('div');
  assistantMsg.className = 'ask-msg assistant';
  assistantMsg.innerHTML = renderAskMarkdown(data.answer);

  // Add source chips if we have sources
  if (data.sources && data.sources.length > 0) {
    const sourcesDiv = document.createElement('div');
    sourcesDiv.className = 'ask-sources';
    for (const src of data.sources.slice(0, 10)) {
      const chip = document.createElement('span');
      chip.className = 'ask-source-chip';
      chip.textContent = src.label;
      chip.title = `Relevance: ${Math.round((src.relevance || 0) * 100)}%`;
      chip.addEventListener('click', () => {
        closeAskPanel();
        enterFocusView(src.id);
      });
      sourcesDiv.appendChild(chip);
    }
    assistantMsg.appendChild(sourcesDiv);
  }

  // Add save button
  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'ask-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'ask-save-btn';
  saveBtn.textContent = 'Save as note';
  saveBtn.addEventListener('click', async () => {
    const noteContent = `Q: ${question}\n\nA: ${data.answer}`;
    const label = `Ask: ${question.slice(0, 50)}${question.length > 50 ? '\u2026' : ''}`;
    const result = await api('/api/add', {
      method: 'POST',
      body: JSON.stringify({
        content: noteContent,
        label: label,
        node_type: 'note',
        use_llm: false
      })
    });
    if (result) {
      saveBtn.textContent = 'Saved!';
      saveBtn.disabled = true;
      loadGraph();
    }
  });
  actionsDiv.appendChild(saveBtn);
  assistantMsg.appendChild(actionsDiv);

  messagesEl.appendChild(assistantMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  input.focus();
}

function renderAskMarkdown(text) {
  // Basic markdown rendering
  let html = text
    // Code blocks (``` ... ```)
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // Bullet lists
    .replace(/^[-\u2022] (.+)$/gm, '<li>$1</li>')
    // Numbered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Wrap consecutive li's in ul
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    // Line breaks to paragraphs
    .split('\n\n').filter(p => p.trim()).map(p => {
      if (p.startsWith('<ul>') || p.startsWith('<pre>')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

  // Make [Label] citations clickable
  html = html.replace(/\[([^\]]+)\]/g, (match, label) => {
    // Check if this label matches a source
    const source = askState.sources.find(s => s.label.toLowerCase() === label.toLowerCase());
    if (source) {
      return `<span class="ask-source-chip" onclick="closeAskPanel();enterFocusView('${source.id}')" style="display:inline;padding:1px 6px;font-size:inherit;">${label}</span>`;
    }
    return match;
  });

  return html;
}

// Ask panel event handlers
document.getElementById('ask-close').addEventListener('click', closeAskPanel);

document.getElementById('ask-send').addEventListener('click', () => {
  const input = document.getElementById('ask-input');
  sendAskQuestion(input.value.trim());
});

document.getElementById('ask-input').addEventListener('keydown', e => {

    sendAskQuestion(e.target.value.trim());
  }
  if (e.key === 'Escape') {
    closeAskPanel();
  }
});

// ─── Chat With Selection ──────────────────
function openChatPanel(nodeIds) {
  if (!nodeIds || nodeIds.length === 0) return;

  chatState = {
    active: true,
    nodeIds: [...nodeIds],
    nodeLabels: {},
    history: [],
    canvasId: null,
  };

  // Build label map from current nodes array
  for (const nid of nodeIds) {
    const node = nodes.find(n => n.id === nid);
    if (node) chatState.nodeLabels[nid] = node.label || '(untitled)';
  }

  const panel = document.getElementById('chat-panel');
  const messagesEl = document.getElementById('chat-messages');
  const headerTitle = panel.querySelector('#chat-header h3');
  messagesEl.innerHTML = '';

  // Reset header for selection chat
  headerTitle.textContent = 'Chat With Selection';

  // Render node chips
  renderChatNodeChips();

  // Restore default quick actions
  renderCanvasChatQuickActions();

  panel.classList.add('open');
  document.getElementById('chat-input').focus();

  // Close selection mode
  exitSelectionMode();
}

function closeChatPanel() {
  chatState.active = false;
  chatState.canvasId = null;
  const panel = document.getElementById('chat-panel');
  panel.classList.remove('open');
  panel.querySelector('#chat-header h3').textContent = 'Chat With Selection';
  document.getElementById('chat-clear').style.display = 'none';
  // Restore default quick actions
  renderCanvasChatQuickActions();
}

async function openCanvasChatPanel(canvas) {
  if (!canvas) return;

  // Get all node IDs on this canvas
  const nodeIds = [...canvasNodeIds];
  if (nodeIds.length === 0) {
    toast('No nodes on this canvas yet');
    return;
  }

  chatState = {
    active: true,
    nodeIds: nodeIds,
    nodeLabels: {},
    history: [],
    canvasId: canvas.id,
  };

  // Build label map from current nodes array
  for (const nid of nodeIds) {
    const node = nodes.find(n => n.id === nid);
    if (node) chatState.nodeLabels[nid] = node.label || '(untitled)';
  }

  const panel = document.getElementById('chat-panel');
  const messagesEl = document.getElementById('chat-messages');
  const headerTitle = panel.querySelector('#chat-header h3');
  messagesEl.innerHTML = '';

  // Set canvas-specific header
  headerTitle.textContent = `Chat: ${canvas.name}`;

  // Render node chips
  renderChatNodeChips();

  // Swap quick actions to canvas-specific ones
  renderCanvasChatQuickActions();

  // Load persistent chat history
  const data = await api(`/api/canvases/${canvas.id}/chat`);
  if (data && data.messages && data.messages.length > 0) {
    for (const msg of data.messages) {
      chatState.history.push({ role: msg.role, content: msg.content });
      const msgEl = document.createElement('div');
      msgEl.className = `chat-msg ${msg.role}`;
      if (msg.role === 'assistant') {
        msgEl.innerHTML = renderChatMarkdown(msg.content, []);
      } else {
        msgEl.textContent = msg.content;
      }
      messagesEl.appendChild(msgEl);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  panel.classList.add('open');

  // Show clear button for canvas chats
  const clearBtn = document.getElementById('chat-clear');
  clearBtn.style.display = 'inline-block';
  clearBtn.onclick = async () => {
    if (!chatState.canvasId) return;
    await api(`/api/canvases/${chatState.canvasId}/chat`, { method: 'DELETE' });
    chatState.history = [];
    document.getElementById('chat-messages').innerHTML = '';
  };

  document.getElementById('chat-input').focus();
}

function renderChatNodeChips() {

async function sendChatMessage(message) {
  if (!message.trim() || chatState.nodeIds.length === 0) return;

  const messagesEl = document.getElementById('chat-messages');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');

  // Show user message
  const userMsg = document.createElement('div');
  userMsg.className = 'chat-msg user';
  userMsg.textContent = message;
  messagesEl.appendChild(userMsg);

  // Show loading
  const loadingEl = document.createElement('div');
  loadingEl.className = 'chat-loading';
  loadingEl.innerHTML = '<div class="spinner"></div>Thinking\u2026';
  messagesEl.appendChild(loadingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  input.value = '';
  sendBtn.disabled = true;

  // Call API
  let data;
  if (chatState.canvasId) {
    // Canvas chat — persistent history managed server-side
    data = await api(`/api/canvases/${chatState.canvasId}/chat`, {
      method: 'POST',
      body: JSON.stringify({ message: message })
    });
  } else {
    // Selection chat — ephemeral history passed per request
    data = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({
        node_ids: chatState.nodeIds,
        message: message,
        history: chatState.history.length ? chatState.history : undefined
      })
    });
  }

  // Remove loading
  loadingEl.remove();
  sendBtn.disabled = false;

  if (!data || !data.reply) {
    const errMsg = document.createElement('div');
    errMsg.className = 'chat-msg assistant';
    errMsg.textContent = 'Failed to get a response. Please try again.';
    messagesEl.appendChild(errMsg);
    return;
  }

  // Update history
  chatState.history.push({ role: 'user', content: message });
  chatState.history.push({ role: 'assistant', content: data.reply });

  // Render assistant message
  const assistantMsg = document.createElement('div');
  assistantMsg.className = 'chat-msg assistant';
  assistantMsg.innerHTML = renderChatMarkdown(data.reply, data.sources || []);

  // Source chips
  if (data.sources && data.sources.length > 0) {
    const sourcesDiv = document.createElement('div');
    sourcesDiv.className = 'ask-sources';
    for (const src of data.sources.slice(0, 10)) {
      const chip = document.createElement('span');
      chip.className = 'ask-source-chip';
      chip.textContent = src.label;
      chip.addEventListener('click', () => {
        closeChatPanel();
        enterFocusView(src.id);
      });
      sourcesDiv.appendChild(chip);
    }
    assistantMsg.appendChild(sourcesDiv);
  }

  // Actions: Save as note
  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'chat-msg-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'chat-save-btn';
  saveBtn.textContent = 'Save as note';
  saveBtn.addEventListener('click', async () => {
    const noteContent = `Chat: ${message}\n\nResponse: ${data.reply}`;
    const label = `Chat: ${message.slice(0, 50)}${message.length > 50 ? '\u2026' : ''}`;
    const result = await api('/api/add', {
      method: 'POST',
      body: JSON.stringify({
        content: noteContent,
        label: label,
        node_type: 'note',
        use_llm: false
      })
    });
    if (result && result.id) {
      // Auto-link the saved note to all source nodes
      for (const nid of chatState.nodeIds) {
        await api('/api/link', {
          method: 'POST',
          body: JSON.stringify({ source_id: result.id, target_id: nid, label: 'summarizes' })
        });
      }
      saveBtn.textContent = 'Saved & linked!';
      saveBtn.disabled = true;
      loadGraph();
    }
  });
  actionsDiv.appendChild(saveBtn);
  assistantMsg.appendChild(actionsDiv);

  messagesEl.appendChild(assistantMsg);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  input.focus();
}

function renderChatMarkdown(text, sources) {
  // Reuse the same markdown rendering as Ask panel
  let html = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^[-\u2022] (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .split('\n\n').filter(p => p.trim()).map(p => {
      if (p.startsWith('<ul>') || p.startsWith('<pre>')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

  // Make [Label] citations clickable
  const sourceMap = {};
  for (const s of sources) sourceMap[s.label.toLowerCase()] = s;

  html = html.replace(/\[([^\]]+)\]/g, (match, label) => {
    const source = sourceMap[label.toLowerCase()];
    if (source) {
      return `<span class="ask-source-chip" onclick="closeChatPanel();enterFocusView('${source.id}')" style="display:inline;padding:1px 6px;font-size:inherit;">${label}</span>`;
    }
    return match;
  });

  return html;
}

        });
      });
    } else {
      simEl.innerHTML = '';
    }
  } else {
    simEl.innerHTML = '';
  }

  // Store current node data for actions
  panel._nodeData = data;
  panel.classList.add('open');
}

async function updateCmdResults(query) {
  const container = document.getElementById('cmd-results');

  if (!query) {
    container.innerHTML = `
      <div class="cmd-item" style="color:var(--text-muted);font-size:12px">
        Type to search • + to add • > to link
      </div>`;
    return;
  }

  // Quick add
  if (query.startsWith('+')) {
    const text = query.slice(1).trim();
    container.innerHTML = `
      <div class="cmd-item active" data-action="add" data-text="${text.replace(/"/g, '&quot;')}">
        <span style="color:var(--accent)">+ Add:</span> ${text || '...'}
        <span class="cmd-item-type">enter to add</span>
      </div>`;
    container.querySelector('.cmd-item').addEventListener('click', async () => {
      if (text) {
        setLoading(true);
        await api('/api/nl', {
          method: 'POST',
          body: JSON.stringify({ text, channel: 'web' })
        });
        setLoading(false);
        toast(`Added: ${text.slice(0, 40)}`);
        closeCmdPalette();
        await loadGraph();
      }
    });
    return;
  }

  // Search
  setLoading(true);
  const data = await api(`/api/search?q=${encodeURIComponent(query)}&limit=8`);
  setLoading(false);

  if (!data?.results?.length) {
    container.innerHTML = `<div class="cmd-item" style="color:var(--text-muted)">No results</div>`;
    return;
  }

  container.innerHTML = data.results.map((r, i) => {
    const color = TYPE_COLORS[r.node_type] || TYPE_COLORS.note;
    return `<div class="cmd-item ${i === 0 ? 'active' : ''}" data-id="${r.id}">
      <div class="conn-dot" style="background:${color}"></div>
      <span>${r.label || r.content?.slice(0, 50)}</span>
      <span class="cmd-item-type">${r.node_type}</span>
    </div>`;
  }).join('');

  container.querySelectorAll('.cmd-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      closeCmdPalette();
      enterFocusView(id);
    });
  });
}

// Voice recording from dialog
const addVoiceBtn = document.getElementById('add-voice-btn');
addVoiceBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    addVoiceBtn.textContent = 'Recording… click to stop';
    addVoiceBtn.style.borderColor = '#ef4444';
    addVoiceBtn.style.color = '#ef4444';

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      addVoiceBtn.textContent = 'Record audio';
      addVoiceBtn.style.borderColor = '';
      addVoiceBtn.style.color = '';
      stream.getTracks().forEach(t => t.stop());
      closeAddDialog();

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const formData = new FormData();
      formData.append('file', blob, 'voice.webm');

      const pt = processingToast('Transcribing audio…');
      try {
        const data = await api('/api/transcribe', { method: 'POST', body: formData });
        if (!data) { pt.done('Transcription failed', 'error'); return; }
        if (data.transcription) pt.update(`Heard: "${data.transcription}"`);
        if (data.action === 'search') {
          pt.done('Search results');
          showSearchResults(data.results, data.response);
        } else if (data.action === 'add') {
          pt.done(data.response || `Added: ${data.node?.label}`);
          await loadGraph();
          if (data.node?.id && nodeMap[data.node.id]) {
            targetCam.x = nodeMap[data.node.id].x;
            targetCam.y = nodeMap[data.node.id].y;
            simAlpha = 1.0;
          }
        } else {
          pt.done(data.response || 'Done');
        }
      } catch (e) {
        pt.done('Voice transcription failed', 'error');
      }
    };
    mediaRecorder.start();
  } catch (e) {
    toast('Microphone access denied', 'error');
  }
});

document.getElementById('drop-zone').addEventListener('dragover', e => e.preventDefault());
document.getElementById('drop-zone').addEventListener('drop', async e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('active');
  const files = e.dataTransfer.files;
  for (const f of files) {
    if (f.type.startsWith('image/') || f.type === 'application/pdf') await uploadFile(f);
  }
});

// Paste image
document.addEventListener('paste', async e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) await uploadImage(file);
    }
  }
});

function uploadFile(file) {
  if (file.type === 'application/pdf') return uploadPDF(file);
  return uploadImage(file);
}

async function uploadImage(file) {
  const note = await promptForNote('Attach a note to this image', file.name);
  const formData = new FormData();
  formData.append('file', file);
  formData.append('content', note);
  formData.append('label', '');

  // Non-blocking: fire and forget with processing toast
  const pt = processingToast(`Uploading image: ${file.name.slice(0, 30)}`);
  fetch(`${API}/api/add-image`, { method: 'POST', body: formData })
    .then(r => r.json())
    .then(async data => {
      pt.done(`Image added: ${data.label?.slice(0, 40)}`);
      await loadGraph();
    })
    .catch(() => pt.done('Image upload failed', 'error'));
}

async function uploadPDF(file) {
  const note = await promptForNote('Attach a note to this PDF', file.name);
  const formData = new FormData();
  formData.append('file', file);
  formData.append('content', note);
  formData.append('label', '');

  // Non-blocking: fire and forget with processing toast
  const pt = processingToast(`Uploading PDF: ${file.name.slice(0, 30)}`);
  fetch(`${API}/api/add-pdf`, { method: 'POST', body: formData })
    .then(r => r.json())
    .then(async data => {
      pt.done(`PDF added: ${data.label?.slice(0, 40)}`);
      await loadGraph();
    })
    .catch(() => pt.done('PDF upload failed', 'error'));
}

// ─── Position Saving ──────────────────────
let positionSaveTimeout = null;
let _positionsDirty = false;

function _getPositionData() {
  return nodes.filter(n => n._pinned).map(n => ({
    id: n.id, x: Math.round(n.x * 100) / 100, y: Math.round(n.y * 100) / 100
  }));
}

function saveNodePosition() {
  _positionsDirty = true;
  clearTimeout(positionSaveTimeout);
  positionSaveTimeout = setTimeout(async () => {
    const positions = _getPositionData();
    if (positions.length) {
      const url = activeCanvas
        ? `/api/canvases/${activeCanvas.id}/positions`
        : '/api/positions';
      await api(url, {
        method: 'POST',
        body: JSON.stringify(positions)
      });
    }
    _positionsDirty = false;
    positionSaveTimeout = null;
  }, 300);
}

// Flush pending saves on page unload via sendBeacon (only fallback)
window.addEventListener('beforeunload', () => {
  if (_positionsDirty) {
    clearTimeout(positionSaveTimeout);
    const positions = _getPositionData();
    if (positions.length) {
      const url = activeCanvas
        ? `${API}/api/canvases/${activeCanvas.id}/positions`
        : `${API}/api/positions`;
      navigator.sendBeacon(url, new Blob([JSON.stringify(positions)], { type: 'application/json' }));
    }
  }
});

// ─── Canvas Management ────────────────────
async function loadCanvases() {
  const data = await api('/api/canvases');
  canvases = data || [];
  renderCanvasSelector();
}

function renderCanvasSelector() {
  const sel = document.getElementById('canvas-selector');
  if (!sel) return;

  let html = `<button class="canvas-tab${!activeCanvas ? ' active' : ''}" data-canvas-id="">Default Map</button>`;
  for (const c of canvases) {
    const dotColor = c.color || '#6ee7b7';
    const isActive = activeCanvas && activeCanvas.id === c.id;
    html += `<button class="canvas-tab${isActive ? ' active' : ''}" data-canvas-id="${c.id}">
      <span class="canvas-dot" style="background:${dotColor}"></span>
      ${escapeHtml(c.name)}
    </button>`;
  }
  html += `<button id="canvas-new-btn">+ New</button>`;
  sel.innerHTML = html;

  // Add canvas chat button if a canvas is selected
  if (activeCanvas) {
    const chatBtn = document.createElement('button');
    chatBtn.id = 'canvas-chat-btn';
    chatBtn.textContent = '\uD83D\uDCAC Chat';
    chatBtn.style.display = 'inline-block';
    chatBtn.addEventListener('click', () => openCanvasChatPanel(activeCanvas));
    sel.appendChild(chatBtn);
  }

  // Wire clicks
  sel.querySelectorAll('.canvas-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const cid = tab.dataset.canvasId;
      if (cid) {
        const c = canvases.find(cv => cv.id === cid);
        selectCanvas(c);
      } else {
        selectCanvas(null);
      }
    });
    // Double-click to edit canvas
    if (tab.dataset.canvasId) {
      tab.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        const c = canvases.find(cv => cv.id === tab.dataset.canvasId);
        if (c) openCanvasModal(c);
      });
    }
  });

  const newBtn = document.getElementById('canvas-new-btn');
  if (newBtn) newBtn.addEventListener('click', () => openCanvasModal());
}

async function selectCanvas(canvas) {
  activeCanvas = canvas;
  if (canvas) {
    // Load canvas-specific graph
    await loadCanvasGraph(canvas.id);
  } else {
    // Back to default map
    canvasNodeIds.clear();
    await loadGraph();
  }
  renderCanvasSelector();
}

async function loadCanvasGraph(canvasId) {
  setLoading(true);
  const data = await api(`/api/canvases/${canvasId}/nodes`);
  setLoading(false);
  if (!data) return;

  canvasNodeIds = new Set(data.nodes.map(n => n.id));
  nodeMap = {};
  nodes = data.nodes.map(n => {
    const node = {
      ...n,
      x: n.x ?? (Math.random() - 0.5) * 400,
      y: n.y ?? (Math.random() - 0.5) * 400,
      z: 0,
      vx: 0, vy: 0, vz: 0,
      radius: calcRadius(n),
      color: TYPE_COLORS[n.type] || TYPE_COLORS.note,
      _pinned: n.pinned
    };
    preloadThumb(node);
    nodeMap[n.id] = node;
    return node;
  });

  edges = data.edges.filter(e => e.on_canvas).map(e => ({
    ...e,
    sourceNode: nodeMap[e.source],
    targetNode: nodeMap[e.target]
  })).filter(e => e.sourceNode && e.targetNode);

  // Also store off-canvas edge stubs for later display
  window._offCanvasEdges = data.edges.filter(e => !e.on_canvas);

  clusters = [];  // No clusters in canvas mode

  // Update stats
  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-edges').textContent = edges.length;

  // Pin all nodes in map mode (canvas uses map layout)
  for (const n of nodes) {
    if (n.x != null && n.y != null) n._pinned = true;
  }
  simAlpha = 0;

  // If some nodes have no position, run a quick simulation
  const unpositioned = nodes.filter(n => !n._pinned);
  if (unpositioned.length > 0) {
    for (const n of unpositioned) {
      n._pinned = false;
      n.vx = (Math.random() - 0.5) * 2;
      n.vy = (Math.random() - 0.5) * 2;
    }
    simAlpha = 0.8;
    simRunning = true;
  }
}

function openCanvasModal(editCanvas = null) {
  const overlay = document.getElementById('canvas-modal-overlay');
  const title = document.getElementById('canvas-modal-title');
  const nameInput = document.getElementById('canvas-name-input');
  const descInput = document.getElementById('canvas-desc-input');
  const colorRow = document.getElementById('canvas-color-row');
  const actionsDiv = document.getElementById('canvas-modal-actions');

  title.textContent = editCanvas ? 'Edit Canvas' : 'New Canvas';
  nameInput.value = editCanvas ? editCanvas.name : '';
  descInput.value = editCanvas ? (editCanvas.description || '') : '';

  // Render color swatches
  const selectedColor = editCanvas?.color || CANVAS_COLORS[0];
  colorRow.innerHTML = CANVAS_COLORS.map(c =>
    `<div class="canvas-color-swatch${c === selectedColor ? ' selected' : ''}" data-color="${c}" style="background:${c}"></div>`
  ).join('');
  colorRow.querySelectorAll('.canvas-color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      colorRow.querySelectorAll('.canvas-color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    });
  });

  // Actions
  let actionsHtml = `<button class="canvas-modal-btn" id="canvas-modal-cancel">Cancel</button>`;
  if (editCanvas) {
    actionsHtml += `<button class="canvas-modal-btn danger" id="canvas-modal-delete">Delete Canvas</button>`;
    actionsHtml += `<button class="canvas-modal-btn primary" id="canvas-modal-save">Save</button>`;
  } else {
    actionsHtml += `<button class="canvas-modal-btn primary" id="canvas-modal-save">Create</button>`;
  }
  actionsDiv.innerHTML = actionsHtml;

  overlay.classList.add('open');
  nameInput.focus();

  // Wire buttons
  document.getElementById('canvas-modal-cancel').addEventListener('click', () => {
    overlay.classList.remove('open');
  });

  document.getElementById('canvas-modal-save').addEventListener('click', async () => {
    const name = nameInput.value.trim();
    if (!name) return;
    const color = colorRow.querySelector('.canvas-color-swatch.selected')?.dataset.color || CANVAS_COLORS[0];
    const desc = descInput.value.trim() || null;

    if (editCanvas) {
      await api(`/api/canvases/${editCanvas.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ name, description: desc, color })
      });
    } else {
      const result = await api('/api/canvases', {
        method: 'POST',
        body: JSON.stringify({ name, description: desc, color })
      });
      if (result) {
        await loadCanvases();
        selectCanvas(canvases.find(c => c.id === result.id) || result);
      }
    }
    overlay.classList.remove('open');
    await loadCanvases();
  });

  const delBtn = document.getElementById('canvas-modal-delete');
  if (delBtn) {
    delBtn.addEventListener('click', async () => {
      if (!confirm(`Delete canvas "${editCanvas.name}"? Nodes will NOT be deleted.`)) return;
      await api(`/api/canvases/${editCanvas.id}`, { method: 'DELETE' });
      overlay.classList.remove('open');
      if (activeCanvas?.id === editCanvas.id) {
        activeCanvas = null;
        canvasNodeIds.clear();
      }
      await loadCanvases();
      await loadGraph();
    });
  }

  // Close on overlay click
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
}

async function addNodeToCanvas(canvasId, nodeId) {
  await api(`/api/canvases/${canvasId}/nodes`, {
    method: 'POST',
    body: JSON.stringify({ node_ids: [nodeId] })
  });
  if (activeCanvas?.id === canvasId) {
    canvasNodeIds.add(nodeId);
  }
}

async function removeNodeFromCanvas(canvasId, nodeId) {
  await api(`/api/canvases/${canvasId}/nodes/${nodeId}`, { method: 'DELETE' });
  if (activeCanvas?.id === canvasId) {
    canvasNodeIds.delete(nodeId);
    // Reload canvas graph
    await loadCanvasGraph(canvasId);
  }
}

function showAddToCanvasDropdown(nodeId, anchorEl) {
  // Remove any existing dropdown
  document.querySelectorAll('.canvas-add-dropdown').forEach(d => d.remove());

  if (canvases.length === 0) {
    openCanvasModal();
    return;
  }

  const dropdown = document.createElement('div');
  dropdown.className = 'canvas-add-dropdown';

  let html = '';
  for (const c of canvases) {
    const dotColor = c.color || '#6ee7b7';
    html += `<div class="canvas-add-option" data-canvas-id="${c.id}">
      <span class="canvas-dot" style="background:${dotColor}"></span>
      ${escapeHtml(c.name)}
    </div>`;
  }
  html += `<div class="canvas-add-option" data-canvas-id="__new__" style="color:var(--text-muted);border-top:1px solid var(--border);margin-top:2px;padding-top:8px">
    + Create new canvas
  </div>`;
  dropdown.innerHTML = html;

  const rect = anchorEl.getBoundingClientRect();
  dropdown.style.left = rect.left + 'px';
  dropdown.style.top = rect.bottom + 4 + 'px';
  document.body.appendChild(dropdown);

  dropdown.querySelectorAll('.canvas-add-option').forEach(opt => {
    opt.addEventListener('click', async () => {
      const cid = opt.dataset.canvasId;
      dropdown.remove();
      if (cid === '__new__') {
        openCanvasModal();
      } else {
        await addNodeToCanvas(cid, nodeId);
      }
    });
  });

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function closer(ev) {
      if (!dropdown.contains(ev.target)) {
        dropdown.remove();
        document.removeEventListener('click', closer);
      }
    });
  }, 0);
}

function renderStream() {
  const container = document.getElementById('view-stream');
  if (!container) return;
  streamPage = 0;

  // Build filter bar
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'inbox', label: 'Inbox' },
    { key: 'idea', label: 'Ideas' },
    { key: 'url', label: 'URLs' },
    { key: 'image', label: 'Images' },
    { key: 'paper', label: 'Papers' },
    { key: 'task', label: 'Tasks' },
    { key: 'today', label: 'Today' },
    { key: 'week', label: 'This Week' },
  ];

  container.innerHTML = `
    <div class="stream-top-bar">
      <div class="stream-filters" id="stream-filters">
        ${filters.map(f => `<button class="stream-chip${streamFilter === f.key ? ' active' : ''}" data-filter="${f.key}">${f.label}</button>`).join('')}
      </div>
      <button class="chat-quick-btn" id="stream-select-toggle">${selectionMode ? 'Cancel Select' : 'Select'}</button>
    </div>
    <div class="stream-master-detail">
      <div class="stream-left" id="stream-left">
        <div id="stream-rediscovery"></div>
        <div id="stream-serendipity"></div>
        <div id="stream-list"></div>
      </div>
      <div class="stream-right" id="stream-right">
        <div id="stream-detail"><div class="sd-empty">Select a card to view details</div></div>
      </div>
    </div>
  `;

  // Filter chip click handlers
  container.querySelectorAll('.stream-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      streamFilter = chip.dataset.filter;
      container.querySelectorAll('.stream-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === streamFilter));
      streamPage = 0;
      streamSelectedId = null;
      renderStreamCards();
      const detail = document.getElementById('stream-detail');
      if (detail) detail.innerHTML = '<div class="sd-empty">Select a card to view details</div>';
    });
  });

  // Select mode toggle
  const selectToggle = document.getElementById('stream-select-toggle');
  if (selectToggle) {
    selectToggle.addEventListener('click', () => {
      if (selectionMode) {
        exitSelectionMode();
        renderStream();
      } else {
        enterSelectionMode();
      }
    });
  }

  renderStreamCards();
  // Fetch rediscovery + serendipity in parallel (only for 'all' filter)
  if (streamFilter === 'all') {
    fetchRediscovery();
    fetchSerendipity();
  }
}

function filterStreamNodes() {
  const now = Date.now();
  const dayMs = 86400000;
  let filtered = nodes.filter(n => n.type !== 'daily');

  if (streamFilter === 'inbox') {
    filtered = filtered.filter(n => n.status === 'inbox');
  } else if (streamFilter === 'today') {
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    filtered = filtered.filter(n => new Date(n.created) >= todayStart);
  } else if (streamFilter === 'week') {
    filtered = filtered.filter(n => (now - new Date(n.created).getTime()) < 7 * dayMs);
  } else if (['idea','url','image','paper','task'].includes(streamFilter)) {
    filtered = filtered.filter(n => n.type === streamFilter);
  }
  // Sort by created DESC
  filtered.sort((a, b) => new Date(b.created) - new Date(a.created));
  return filtered;
}

function buildStreamFieldRow(label, value) {
  return `<div class="stream-field-row"><span class="field-label">${escapeHtml(label)}</span><span class="field-dots"></span><span class="field-value">${escapeHtml(value)}</span></div>`;
}

function buildStreamFieldChips(node) {
  const meta = node.meta || {};
  const rows = [];
  const t = node.type;
  if (t === 'task') {
    if (meta.priority) rows.push(buildStreamFieldRow('Priority', meta.priority));
    if (meta.task_status && meta.task_status !== 'todo') rows.push(buildStreamFieldRow('Status', meta.task_status));
    if (meta.task_due) rows.push(buildStreamFieldRow('Due', meta.task_due));
  } else if (t === 'paper') {
    if (meta.authors) rows.push(buildStreamFieldRow('Authors', String(meta.authors).slice(0, 40)));
    if (meta.year) rows.push(buildStreamFieldRow('Year', String(meta.year)));
    if (meta.read_status) rows.push(buildStreamFieldRow('Status', meta.read_status));
  } else if (t === 'person') {
    if (meta.role) rows.push(buildStreamFieldRow('Role', meta.role));
    if (meta.company) rows.push(buildStreamFieldRow('Company', meta.company));
  } else if (t === 'url') {
    if (meta.site_name) rows.push(buildStreamFieldRow('Site', meta.site_name));
    if (meta.read_status) rows.push(buildStreamFieldRow('Status', meta.read_status));
  } else if (t === 'project') {
    if (meta.project_status) rows.push(buildStreamFieldRow('Status', meta.project_status));
  } else if (t === 'idea') {
    if (meta.idea_status) rows.push(buildStreamFieldRow('Status', meta.idea_status));
    if (meta.domain) rows.push(buildStreamFieldRow('Domain', meta.domain));
  }
  // Always show temperature as a "rent" value
  if (node.temperature !== undefined) {
    rows.push(buildStreamFieldRow('Temperature', (node.temperature || 0).toFixed(2)));
  }
  if (rows.length === 0) return '';
  return `<hr class="stream-card-divider"><div class="stream-card-fields">${rows.join('')}</div>`;
}

// Monopoly card banner colors by node type
const MONOPOLY_COLORS = {
  url: '#0072BB', image: '#9B59B6', note: '#2ECC71',
  idea: '#F1C40F', paper: '#E74C3C', task: '#E67E22',
  project: '#8E1600', person: '#1ABC9C', appointment: '#3498DB',
  daily: '#95A5A6'
};

function buildStreamCard(node) {
  const card = document.createElement('div');
  card.className = 'stream-card' + (node.status === 'inbox' ? ' inbox' : '') + (node.id === streamSelectedId ? ' stream-selected' : '');
  card.dataset.id = node.id;

  const bannerColor = MONOPOLY_COLORS[node.type] || MONOPOLY_COLORS.note;
  const thumbUrl = getThumbUrl(node);
  const edgeCount = getEdgeCount(node.id);
  const preview = (node.content || '').replace(/\n/g, ' ').slice(0, 100);
  const temp = node.temperature || 1;
  const opacity = Math.max(0.5, Math.min(1, 0.4 + temp * 0.4));
  const bannerTextColor = node.type === 'idea' ? 'rgba(30,25,0,0.9)' : 'rgba(255,255,255,0.95)';
  const bannerTextShadow = node.type === 'idea' ? 'none' : '0 1px 2px rgba(0,0,0,0.3)';

  card.style.opacity = opacity;
  // Image is the MOST prominent element — fills card face
  const mediaHtml = thumbUrl
    ? `<img class="stream-card-thumb" src="${escapeHtml(thumbUrl)}" alt="" loading="lazy" />`
    : (preview ? `<div class="stream-card-preview">${escapeHtml(preview)}</div>` : '');

  card.innerHTML = `
    <div class="stream-card-banner" style="background:${bannerColor}">
      <span class="stream-card-banner-label" style="color:${bannerTextColor};text-shadow:${bannerTextShadow}">${escapeHtml(node.type)}</span>
    </div>
    <div class="stream-card-body">
      ${node.starred ? '<div class="stream-card-star">&#9733;</div>' : ''}
      <div class="stream-card-label">${escapeHtml(node.label || '(untitled)')}</div>
      ${mediaHtml}
      <div class="stream-card-footer">
        <div class="stream-card-footer-left">
          <span>&#127777;${temp.toFixed(1)}</span>
          ${edgeCount ? `<span>${edgeCount}&#128279;</span>` : ''}
        </div>
        <span class="stream-card-time">${relativeTime(node.created)}</span>
      </div>
    </div>
  `;

  card.addEventListener('click', () => {
    if (selectionMode) {
      toggleNodeSelection(node.id, card);
    } else {
      selectStreamCard(node.id);
    }
  });
  return card;
}

function renderStreamCards() {
  const list = document.getElementById('stream-list');
  if (!list) return;
  list.innerHTML = '';

  const filtered = filterStreamNodes();
  const end = (streamPage + 1) * STREAM_PAGE_SIZE;
  const pageItems = filtered.slice(0, end);

  if (pageItems.length === 0) {
    list.innerHTML = `<div class="stream-empty">${streamFilter === 'all' ? 'No nodes yet. Type something below to add your first thought.' : 'No ' + streamFilter + ' nodes found.'}</div>`;
    return;
  }

  for (const node of pageItems) {
    list.appendChild(buildStreamCard(node));
  }

  // "Load more" button
  if (end < filtered.length) {
    const btn = document.createElement('button');
    btn.className = 'stream-load-more';
    btn.textContent = `Load more (${filtered.length - end} remaining)`;
    btn.addEventListener('click', () => {
      streamPage++;
      renderStreamCards();
    });
    list.appendChild(btn);
  }

  // Auto-select first card if nothing selected
  if (!streamSelectedId && pageItems.length > 0) {
    selectStreamCard(pageItems[0].id);
  }
}

// ─── Stream Detail Panel ──────────────────
async function selectStreamCard(nodeId) {
  streamSelectedId = nodeId;
  // Update selected visual state
  document.querySelectorAll('.stream-card').forEach(c => {
    c.classList.toggle('stream-selected', c.dataset.id === nodeId);
  });
  // Scroll selected card into view in left column
  const sel = document.querySelector(`.stream-card[data-id="${nodeId}"]`);
  if (sel) sel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  // Fetch full node data with connections
  const data = await api(`/api/node/${nodeId}`);
  if (!data) return;
  renderStreamDetail(data);
}

function buildDetailFieldRow(label, value) {
  return `<div class="sd-field-row"><span class="field-label">${escapeHtml(label)}</span><span class="field-dots"></span><span class="field-value">${escapeHtml(String(value))}</span></div>`;
}

function renderStreamDetail(data) {
  const container = document.getElementById('stream-detail');
  if (!container) return;

  const bannerColor = MONOPOLY_COLORS[data.type] || MONOPOLY_COLORS.note;
  const bannerTextColor = data.type === 'idea' ? 'rgba(30,25,0,0.9)' : 'rgba(255,255,255,0.95)';
  const bannerTextShadow = data.type === 'idea' ? 'none' : '0 1px 2px rgba(0,0,0,0.3)';
  const thumbUrl = data.image ? `/uploads/${data.image}` : (data.meta?.thumbnail ? `/uploads/${data.meta.thumbnail}` : (data.meta?.image || null));
  const edgeCount = getEdgeCount(data.id);
  const connected = data.connected || [];

  // Build Monopoly rent-price style property fields
  const fields = [];
  fields.push(buildDetailFieldRow('Type', data.type));
  fields.push(buildDetailFieldRow('Status', data.status || 'unknown'));
  fields.push(buildDetailFieldRow('Temperature', (data.temperature || 1).toFixed(2)));
  fields.push(buildDetailFieldRow('Links', String(edgeCount)));
  fields.push(buildDetailFieldRow('Visits', String(data.visits || 0)));
  fields.push(buildDetailFieldRow('Created', relativeTime(data.created)));
  if (data.due_date) fields.push(buildDetailFieldRow('Due', data.due_date));

  // Type-specific metadata fields
  const meta = data.meta || {};
  if (data.type === 'task') {
    if (meta.priority) fields.push(buildDetailFieldRow('Priority', meta.priority));
    if (meta.task_status) fields.push(buildDetailFieldRow('Task Status', meta.task_status));
    if (meta.task_due) fields.push(buildDetailFieldRow('Due', meta.task_due));
  } else if (data.type === 'paper') {

      <div class="sd-content" id="sd-content">${escapeHtml(data.content || '(no content)')}</div>

  container.querySelectorAll('.sd-connection').forEach(el => {

  });

async function handleStreamDetailAction(action, data) {
  if (action === 'focus') {
    enterFocusView(data.id);
    return;
  }
  if (action === 'edit') {
    const labelEl = document.getElementById('sd-label');
    const contentEl = document.getElementById('sd-content');
    if (!labelEl || !contentEl) return;
    const btn = document.querySelector('#sd-actions [data-action="edit"]');
    if (labelEl.contentEditable !== 'true') {
      labelEl.contentEditable = 'true';
      contentEl.contentEditable = 'true';
      labelEl.focus();
      if (btn) btn.textContent = 'Save';
    } else {
      const newLabel = labelEl.textContent.trim();
      const newContent = contentEl.textContent.trim();
      await api(`/api/node/${data.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ label: newLabel, content: newContent })
      });
      labelEl.contentEditable = 'false';
      contentEl.contentEditable = 'false';
      if (btn) btn.textContent = 'Edit';
      await loadGraph();
      selectStreamCard(data.id);
    }
  } else if (action === 'star') {
    await api(`/api/node/${data.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ starred: !data.starred })
    });
    await loadGraph();
    selectStreamCard(data.id);
  } else if (action === 'promote') {
    await api(`/api/node/${data.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'permanent' })
    });
    await loadGraph();
    selectStreamCard(data.id);
  } else if (action === 'delete') {
    if (!confirm('Delete this node?')) return;
    await api(`/api/node/${data.id}`, { method: 'DELETE' });
    streamSelectedId = null;
    await loadGraph();
    renderStreamCards();
    const detail = document.getElementById('stream-detail');
    if (detail) detail.innerHTML = '<div class="sd-empty">Select a card to view details</div>';
  } else if (action === 'chat') {
    enterFocusView(data.id);
    setTimeout(() => handleFocusAction('chat'), 300);
  }
}

async function fetchRediscovery() {
  const container = document.getElementById('stream-rediscovery');
  if (!container) return;
  const data = await api('/api/resurface?count=3');
  if (!data || !data.length) { container.innerHTML = ''; return; }

  const section = document.createElement('div');
  section.className = 'rediscovery-section';
  section.innerHTML = `<div class="rediscovery-header">From your archive</div>`;

  const row = document.createElement('div');
  row.className = 'rediscovery-cards';

  for (const node of data) {
    const card = document.createElement('div');
    card.className = 'rediscovery-card';
    const preview = (node.content || '').replace(/\n/g, ' ').slice(0, 80);
    const daysText = node.days_ago === 1 ? '1 day ago' : `${node.days_ago} days ago`;
    card.innerHTML = `
      <div class="rediscovery-card-badge">Saved ${daysText}</div>

  container.innerHTML = '';
  container.appendChild(section);
}

// ─── Focus View ───────────────────────────
async function enterFocusView(nodeId) {
  setLoading(true);
  const data = await api(`/api/node/${nodeId}`);
  setLoading(false);
  if (!data) return;

  focusState.active = true;
  focusState.centerId = nodeId;
  focusState.centerData = data;
  focusState.isEditing = false;

  // Enable focus tab
  const focusTab = document.getElementById('tab-focus');
  if (focusTab) focusTab.disabled = false;

  switchView('focus');
}

function renderFocusView() {
  const container = document.getElementById('view-focus');
  if (!container || !focusState.centerData) return;
  const data = focusState.centerData;
  const color = TYPE_COLORS[data.type] || TYPE_COLORS.note;

  // Build nav bar
  const historyLabels = focusState.history.map((h, i) =>
    `<span class="focus-breadcrumb-item" data-idx="${i}" style="cursor:pointer;color:var(--accent)">${escapeHtml((h.label || '').slice(0, 20))}</span>`
  ).join(' › ');

  container.innerHTML = `
    <div class="focus-nav">
      <button class="focus-nav-btn" id="focus-back" ${focusState.history.length === 0 ? 'disabled' : ''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <div class="focus-breadcrumb">${historyLabels}${historyLabels ? ' › ' : ''}<strong>${escapeHtml((data.label || '').slice(0, 30))}</strong></div>
      <label class="focus-2hop-toggle">
        <input type="checkbox" id="focus-2hop" ${focusState.show2Hop ? 'checked' : ''} />
        2-hop
      </label>
    </div>
    <div class="focus-layout" id="focus-layout">
      <svg id="focus-lines" width="100%" height="100%"></svg>
      <div id="focus-center"></div>
    </div>
  `;

  // Wire nav
  const backBtn = document.getElementById('focus-back');
  if (backBtn) backBtn.addEventListener('click', focusGoBack);

  container.querySelectorAll('.focus-breadcrumb-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const entry = focusState.history[idx];
      if (entry) {
        // Trim history to that point
        focusState.history = focusState.history.slice(0, idx);
        focusNavigate(entry.id);
      }
    });
  });

  const hopToggle = document.getElementById('focus-2hop');
  if (hopToggle) hopToggle.addEventListener('change', () => {
    focusState.show2Hop = hopToggle.checked;
    renderFocusView();
  });

  renderFocusCenter(data);
  renderFocusNeighbors(data.connected || []);
}
